body:
  text: 可間老人集卷二明張昱撰五言絶句梅花十絶種梅如昨日樹已過人長粉白東鄰女爭窺出院牆小玉探春回褰簾笑語來今朝庭樹上忽有數花開黃鐘才應律英萼已舒芽不笑黃金栁先開白玉花漢主黃金屋盧家白玉堂暗香浮動處愁思月昏黃一枝憐似玉日暮正愁新寂寞珍珠珮天寒翠袖人數點飄香雪非關畫角吹驚心調鼎事細雨緑隂時雪落紗忩外寒梅正著花不同桃李樹爭艷五侯家新月回宫簷梅妝艷於雪誰為五出花能加天下白姑射有處子雪色而內視肌粟寒不生香篝熏素被樹老苔衣厚花稀春事遲為緣生驛路都是折殘枝題畫筆墨生幽思山居春日長獨謠橋上路亦自惜年芳夜坐夜長春酒醒敧枕何曾睡時見燭花中餘光吐金穗題竹落墨生幽思風來自有香九天皆雨露容易拂雲長題西湖大佛頭寺佛身滿法界金色從地起若人加莊嚴其福亦如是題枯木竹石圖石氏珊瑚樹楊家翡翠鈎千年風雨後遺影海中洲青山白雲圖俗駕真難到滿山都是雲雲中有樓觀鸞鶴日相聞題畫山水溪回岸影深山迥溪聲響獨有溪上人扁舟自來往題諸葛孔明像一笑出隆中黃星掩日紅妖氛不敢作白羽起西風詠雞鳳凰有五色雞亦有五德鼓翼不妄啼一聲天下白七言絶句題孔明抱膝圖抱膝長吟彼一時卧龍消息有誰知能聽天下三分計賴有劉家大耳兒題羲之寫扇圖蒲扇新題墨未乾也應技癢要人看阿婆莫謾提籃去明日街頭寫便難訪舊三竺次泐禪師雜興韻但教懷抱能傾倒莫向樽罍計有無不為訪僧三竺寺肯乘煙艇過西湖酒館湖船盡有名玉杯時得肆間情至今人説張員外不是看花不出城為桐峯講主題風煙梅二畫長林春早玉煙新未許風光殿後塵留得維摩方丈在碧紗遮護散花人高坐天人白玉牀袈裟都是素毫光東風也自知消息箇箇吹香入道場題墨梅一點嬌飛傍鏡臺曾隨笑靨貼宫腮如今莫説顔如玉何限風煙馬上來白描杏花小樓春雨賣花時盡説京城好女兒有筆何應描不就況兼紅粉不曾施白描水仙花月下歸來看未真烏絲幾縷欲生春莫教縞帶隨風逺留綰明珠贈洛神荔枝畫一勺瓊漿貯絳霞好招鸚鵡過西家若為解得相如渴免向金莖泣露華題十八學士奕棋圖瀛州風景最清真一代人材盡鳳麟莫道深山更深處旁觀都是下碁人五陵遊俠圖白雪肌膚白玉鞍渾身俊氣許人看若知稼穡艱難處肯把黃金鑄彈丸題桂花仙子黃金碎搗作微塵露染秋和色未勻回首瓊林休悵望素娥元是月中人秋雲幾片作衣裳吹盡西風骨亦香明月若教生洛浦可勝才思惱陳王題徽廟螃蟹圖閲盡蟲魚爾雅篇間將藤素染蒼煙不知畫得招潮後艮嶽從教變海田長白山前謾拔都清華小殿試操觚含毫應笑滕王拙不寫秋沙郭索圖題畫梅年年長與栁爭春數點風前更可人待得緑隂成子後暗香疏影總隨身題明皇擊毬圖管籥聲隨萬乘遊開元毬馬最風流九齡老去無人諫不破中原不肯休題黃花白蝶扇面一枝秋露染初勻曾伴淵明漉酒巾若道夢中能化蝶飛來應是白衣人題大慈寺僧房老禪相見具袈裟旋汲新泉自煮茶笑問世間春幾許東風開遍石巖花題紙瓶留别育王寺長老照大千朝市山林自一家要知逢掖即袈裟青蘋波上涼風起定到禪房看蕙花題剡溪夜雪圖雪月相邀過剡川芙蓉逺近玉生煙戴家亭館多風致只好到門回酒船題二馬圖卸却銀鞍得自由偶因鬃癢一回頭青絲幾尺無拘束曾控風雲遍九州春明仰首一長嘶莫説河冰迸玉蹄曾與將軍同患難等間平步到檀溪江南曲阿姊却從何處來芙蓉有露濕香腮相呼相應棹船去知是鄰家鬭鴨回一束蓮莖學細腰塗金艇子木蘭橈東家姊妹西家去更約明朝去看潮贈琴士萬樹流鶯御苑西朝回騎馬醉如泥如今都向山堂宿聽得琴中烏夜啼小遊仙次韻四首漢武求仙未絶情枉將心力事金莖靈王太子因無欲吹得琅玕作鳳鳴桂閣金銀不甚高仙山幾許隔波濤信回青鳥無尋處一色春風是絳桃小娃莫説臉如蓮自牧羊龍向葑田笑指清泠橋下水此中元是碧瑤天青蛇昨夜付書回只許麻姑自拆開説道蓬萊山下路莫因清淺不歸來題鸚鵡仕女圖美人應自惜年華庭院沈沈鎖暮霞只有舊時鸚鵡見春衫曾似石榴花題露荷風栁扇面猶恐丹砂染未勻波中影是鏡中身長眉畫向春風裏不許人間更效顰此扇當年定賜誰淚痕猶自舊胭脂班姬莫用間相詠次第涼風到汝吹秋夕紫藤滿架月華明一片涼風絡緯聲猶有西江未歸客倚船因爾動離情過泖湖泖湖有路接天津萬頃銀花小浪勻安得滿船都是酒船中更載浣紗人過金粟寺看東坡竹東坡仙去三百載海上猶存丹鳳巢醉裏自將衫袖下拂開塵壁看煙梢題凝思士女萱草花開一兩枝薰風更是斷腸時自家團扇無心把想得回文織錦詩題盧媪家誰似禇莊盧媪家開門繞屋是荷花收來麥把雲成垜繅動蠶絲雪滿車船坊小小栁依依田舍人家儘自肥溪水受隂魚出躍薰風吹暑燕交飛過蕭山縣原野蕭條井邑虛居人都是劫灰餘橋邊猶有江淹寺不為題詩駐使車題吳綵鸞寫韻圖小點紅鸞欲下遲逺山渾是畫來眉如何一念人間事上界仙曹便得知同徐大章溪上看芙蓉日暮歸來雨濕衣涼風千樹綵雲飛渚宫只在秋江上何事襄王夢到稀宫詞次周員外韻時樣宫眉不甚長再三笑語問同房內園有約看花去稱得春衫繡鳳凰題左司壁省中莫説文書簡開遍杏花渾不知今日樹邊騎馬過滿衣春雨立多時題毛女一钁長隨玉雪身女中還有爛柯人相逢好向麻姑説東海千年又化塵題東坡竹三百餘年屈指過猶於遺墨見東坡雖然數尺黃州竹寫出參天直節多題蘇小小像湖上行雲逐步移手攜團扇欲何之鬢邊莫笑間花草也是當時第一枝題蜻蜓蛺蝶畫扇點水穿花不自疑輕盈滿扇欲何之栁塘一覺風流夢又是秋香欲老時觀奕圖為楊左丞題楊完者都局中勝負幾回新畫在丹青亦損神莫把等間消歲月旁觀都是下棋人求仙辭漢皇承露鑄金莖别道雲間有玉京萬乘旌旗不隨去此身何用獨長生不見王喬馭鶴還秖應憔悴老空山何如修取金仙法滅盡空花出世間荷花詞次韻周伯溫參政朝霞染得好衣裳吹遍湖頭風露香身分可憐年紀小纎腰一束鬱金黃少年慣服白硃砂養得容顔故似霞生長六橋楊栁岸不知湖水是儂家莫訝吳儂説靚妝紅綃貼體肉生香夜來相伴緑荷葉受用滿湖風露涼一種西湖與若耶鴛鴦宿處便為家秋房結得新蓮子便是當時藕上花上元夫人詞阿母親曾與製衣手攀雲錦下天機自從宴罷茅君後寂寞龜壇會更稀瘦馬少盡其力老棄之此豈有意埋敝帷不如汗血陳前死以革就裹將軍尸栁枝詞尊前不奈小腰身爭欲攙先上舞茵多謝東風好擡舉盡情分付畫眉人春光領略不勝嬌搖蕩東風千萬條悔盡江州白司馬一生空詠小蠻腰折栁枝愁向尊前唱渭城栁枝折盡贈人行早知世路多離别移在郵亭逺處生唐天寶宫詞十五首壽王妃子在青春賜與黃冠號太真不是白頭高力士翠華那得逺蒙塵徹夜宫中按羽衣明朝册拜太真妃鳳凰閣裏承恩後從此君王出內稀興慶池頭芍藥開貴妃步輦看花來可憐三首清平調不博西涼酒一杯清源小殿合涼州羯鼓琵琶響未休為是阿瞞供樂籍八姨多費錦纒頭蓬萊前殿摘黃柑一色金盤賜內官揀得枝頭合歡實畫圖傳與大家看玉笛當年是賜誰可教妃子得偷吹還家剪下青絲髮持謝君王意可知天子樓前百戲陳大娘竿舞最驚人貴妃獨賞劉郎詠牙笏羅袍色色新舁上兒綳滿翠容黃裙高髻一叢叢君王入內聞歡笑賜與金錢滿六宫四海承平倦萬幾只將彩戲悅真妃不平最是彈雙陸骰子公然得賜緋小部梨園出教坊曲名新賜荔枝香霓裳按舞長生殿擊碎梧桐夜未央共指雙星出殿遲並肩私語有誰知君王未出長安日肯信人間有别離香囊遺下佛堂階不使君王不愴懷想著當年雪衣女羽衣猶得苑中埋勤政樓中夜正長上皇西望轉淒涼侍兒惟有紅桃在一曲涼州淚萬行龍女殷勤道姓名淩波池上乞新聲周公不入君王夢誰與蒼生致太平天寶年間寵賈昌黃衫年少滿雞坊絳冠鬭罷羅纒項又得君王笑一場趨府燕子梁間漸有聲碧油忩外未天明長街官樹留殘月滿馬好風吹宿酲小寒花外東風作小寒輕紅淡白滿闌干春光不與人憐惜留得清明伴牡丹涼思朝來風雨怯輕羅便覺涼秋意思多一夜不眠聯翠被餘香消盡滿池荷覺來好風吹雨覺來遲開遍荼蘼總不知團扇晚涼人似玉也須消瘦暮春時春光湖上偏多楊栁風桃花吹盡雨前紅等間却被東君笑大半春光在醉中栁花詞望窮河水是隋家風落長堤御栁斜春盡花飛留不住白頭啼遍後栖鴉欄馬牆西欲暮春花飛不復過中旬倚天樓閣晴光裏爭撲珠簾不避人章華臺下路西東走馬歸來滿袖風吹起萬條枝上雪等間迷却細腰宫滿院長條散緑隂誰家門户碧沈沈地衣不許重簾隔雪白花鋪一寸深揚州寺前楊栁多栁枝能舞更能歌夜來吹入維摩室化作天花可奈何孟院判宅辭飲病來酒力未能加易覺衰容染絳霞團扇涼風吾欲睡不勞頻看石榴花酒名輦下曲有序昱備員宣政院判官以僧省事簡搜索舊文藁於囊中曩在京師時有所聞見輒賦詩有宫中詞塞上謠共若干首合而目之曰輦下曲其據事直書辭句鄙近雖不足以上繼風雅然一代之典禮存焉黃金大殿萬斯年十二丹楹日月邊傘蓋威蕤當御榻珠光照耀九重天五垓千陛立朝廷檻首銅雕一丈翎不待來儀威鳳至日聞韶濩在青冥州橋拜伏兩珉龍向下天潢一派通四海仰瞻天子氣日行黃道貫當中方朝猶是未明天玉戚輪竿已儼然百獸蹲威繪幡下萬臣效職內門前東樓緋服唱雞人擊到朱鼙第幾聲楠寐奉常先告備駕行三叩紫鞘鳴至元典禮當朝會宗戚前將祖訓開聖子神孫千萬世俾知大業此中來二九行分正從班盡將牙笏注名單簟鋪獸鎮丹墀內鵠立千官繞畫闌國戚來朝總盛容左班翹鶡右王封功臣帶礪河山誓萬歲千秋樂未終靜瓜約閙殿西東頒宴宗王禮數隆酋長巡觴宣上旨儘教滿飲大金鍾萬方表馬賀生辰班首師臣與相臣喝贊禮行天樂動九重宫闕一時新三司侍宴皇情洽對御吹螺大禮終寶扇合鞘催放仗馬蹄哄散萬花中授時厯進當冬至太史舁官近御前御用粉箋題國字帕黃封上榻西邊泥金歷水順飄揚掌扇香吹殿角涼不是內官親執御太平無用鎮非常只孫官樣青紅錦裹肚圓文寶相珠羽仗執金班控鶴千人魚貫振嵩呼全裝節仗冒金錢振竦高擎玉陛前軃袖行交太平字回鑾猶是步蹁蹮黃金酒海贏千石龍杓梯聲給大筵殿上千官多取醉君臣胥樂太平年西天法曲曼聲長瓔珞埀衣稱艷妝大宴殿中歌舞上華嚴海會慶君王職貢蠻夷通海徼管衣毳帽步逡巡翠華閣下頒繒幣聖主留恩柔逺人竹扛金鑄百尋餘頂版高鐫萬國書禁得下方雷與電聲光不敢近皇居崇天門下聽宣赦萬姓歡呼萬歲聲豈獨罪人蒙大宥普天率土盡關情户外班齊大禮行小臣鳴贊立朝廷八風不動丹墀靜聽得宫袍舞蹈聲墀左朱闌草滿叢世皇封植意尤濃艱難大業從兹起莫忘龍沙汗血功國初海運自朱張百萬樓船渡大洋有訓不教忘險阻御厨先飯進黃粱旗常萬乘綴旒旓玉瓘升壇藉白茅前月太常班鹵簿安排法駕事南郊清廟上尊元不罩爵呈三獻禮當終巫臣馬湩望空灑國語辭神妥法宫遼東羞貢入神厨祭鮪專車一丈魚寢廟歲行春薦禮有加鉶豆雜鮮腒禽鳥之肉國俗祠神主中霤氊車氊俑挂宮燈神來鼓盞自飛