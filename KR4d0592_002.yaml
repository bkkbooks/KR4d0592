草幾宵明月竹枝好一夜東風萱草長悵望美人煙水濶不勝清思繞橫塘荔枝畫為福建僉憲張惟逺題濟南人樽前人出玉芙蓉纎手親分荔子紅歸得大明湖上宴也應看畫説閩中茜羅輕裹玉肌寒吹盡南風露未乾一寸丹心無與寄為慿圖畫入長安紅塵一騎露華香不管盧龍道路長誰信御前供玉食不呈妃子不先嘗六月南風荔子丹皺紅小碧滿銀盤水晶細嚼甜於蜜滿口生香玉露漙剪花士女咫尺芳叢艷色深蜂情蝶思兩難禁看來莫用間惆悵剪下春風一寸心題趙仲穆人馬圖廏吏牽呈御苑回開元求馬盡龍媒趙家富有曹韓樣摹出承平氣象來劉曜卿畫折花宫女栁風草露欲沾衣又是宫中上直時好把桃花都折盡免教吹作落紅飛錢舜舉畫芙蓉木葉芙蓉最耐寒等間不許世人看蛾眉淡掃朝天去自採花頭製道冠梅花水月仙子畫遊魂非鬼亦非仙慿附梅花度歲年欲向姮娥訴孤另浪中亦自少團圓招周德新員外觀菊明朝莫問晴和雨騎馬能來看菊花豈是省郎無酒對不知此處似陶家題扇士女轉深文字轉多情侍女常將筆硯行思得玉臺新樣句為題團扇贈卿卿湖中即事湖栁湖波盡可憐不知春在阿誰邊滿頭翡翠雙鬟女細雨吳歌濕畫船挾彈遊騎圖趙仲穆畫玉臂雙楦據綺鞍渾身俊氣要人看若知稼穡艱難事肯把黃金鑄彈丸李白應制圖明主憐才赦酒狂不知力士賤文章當其醉草清平調肯信長安是夜郎杜甫上謁圖出當天寶艱難日歸拜拾遺行在時入蜀還秦底心性一篇長拜杜鵑詩寄逺詞夢裏關山覺後非憂深别淚在羅衣堂前種得宜男草正及春香人未歸臨安訪古十首石鏡臨安山中古石鏡曾照錢王冕服來天遣紫苔封裹後等間不許别人開婆留井錢王初生時將棄井中婆奪留之故乳名婆留既貴以鏐代留字舊日婆留井未堙石欄苔蘚上龍鱗而今率土皆臣妾莫願皇天産異人功臣塔峯頭石塔表功臣五百年前是佛身莫問蓬萊水清淺野藤猶蔓劫餘春錦溪錢王功業與天齊百里旌旗照此溪彼此波中鋪錦後至今光景淨無泥化城寺錢王第十九子出家為僧賜號普照大師王子能以身施佛何異生居淨飯宫敝屣視他間富貴男兒到此是英雄衣錦山今縣治主山是王故居即九龍堂還鄉滿山都覆錦冨貴應須白晝歸設宴九龍堂上日沛中歌後似王稀將軍樹王平時率羣隊狂戲此樹下還鄉以錦幪之號錦樹將軍將軍官重執金吾不比秦朝列大夫王為錦衣歸故里遂令老樹有稱呼環翠閣謝安遊處今為寺東山尚存環翠閣謝傅來遊經幾年可是舊時攜妓到粉香猶在畫闌邊淨土寺東坡作杭倅行部過於潛回至此祥符賜額海會寺四百年來彈指過試問竹林橋下路往還曾見幾東坡九仙山王謝舊遊東坡有詩仙子何年化鶴羣至今名姓只空聞我來欲訪前朝事悵望九仙惟白雲鴻溝天命何曾分楚漢自將南北限鴻溝當時應恨烏江水不與君王照白頭李白小像承制摛毫玉殿頭清平樂府擅風流名花傾國能相妬得寵翻遺失寵憂桃源圖幾樹桃花認未真又何分晉與分秦漁郎不悟避秦者便把興亡説與人蘇小小墳上作在嘉興縣前晉名妓錢塘人有詞行於世今為人家占矣香骨沈埋縣治前西陵魂夢隔風煙好花好月年年在潮落潮生更可憐宋贊善以笻竹一枝并詩贈玘太朴次其韻庸蜀之西一竹笻年來蛻骨己如龍扶登春殿談經後風雨時生掌握中題臧祥卿畫露桃風栁兩依依畫在丹青亦自竒若在牆頭并驛畔過春都是折殘枝問蕳夷道索冬笋僧家嗜笋如嗜肉滿腹生香貯寒玉肯信湖州太守饞飢來煮遍千林竹徐一夔以自己小影代送塤上人回龍門寺為題其上總是三生夢幻身又何分别假和真總饒送到龍門寺也是丹青畫裏人邵庵虞先生為張伯雨賦四詩開元宫道士章心逺求追次其韻伯雨畫像號句曲外史此畫茅山第幾真翛然白氅鶴翎新百年身世歸歌詠一代交遊在縉紳懷舊憶誦清江空舊魚流光如赴隙中駒雲沈華蓋星沈海思絶狂張與老虞丹井今在佑聖觀東圃張仙於此煉丹砂夜夜丹光照井華猶有石闌遺刻在將軍移置羽人家澗阿碑邵庵文字在堅珉摹刻中郎筆畫真在日得錢除買酒餘資都付打碑人贈人遊湖南世途無處不通津惟爾栖栖志未伸莫過沅湘唾江水此中曾有汨羅人趙子昻畫花鳥綺紈舊習信難移得意青春正好時直下玉廬無所事試臨花鳥學徐熙春日一陳東風一陳寒芭蕉長過石闌干只銷幾箇瞢騰醉看得春光到牡丹瞿宗吉云此詩刺淮張用事諸人也六言絶句題青山白雲一箇茅廬何處小橋古木溪灣但見山青雲白不知天上人間四言詩題鍾馗夢以自見正以辟邪賜之袍笏人耶鬼耶長短句巫山高巫山高望不及際天微茫十二峯彩雲上蒸靈雨集中有瓊臺承翠館曼態修容相出入君王荒淫進神女直以夢中為白日洛汭無聞五子歌宋玉微辭諷何及巫山高望不及不比堯階土三尺君馬黃君馬黃我馬白十月風高塞草枯鐵衣夜浸盧龍月深入單于臣敢辭邊城土是征人血翹搖花翹搖花清明時節遍天涯東阡南陌畫輪車樂遊踐之同泥沙城中多少富豪家去年不見今年花慎勿輕賤翹搖花擬古秋夜長雲中鴻雁過門前朔風起梧桐葉落金井頭月照烏啼天似水誰家機上織回文夜聽啼烏如不聞明朝為遣安西使細意緘題持贈君古意頭上鳳凰叉是郎手中物床上鴛鴦衾是妾手自織將叉與衾寄郎去願郎長見長相憶拙逸齋羣峰兮立立衆流兮湜湜大木千章兮丘陵是植桑麻百頃兮蔽於原隰翁居是間兮以作以息階庭五子兮蘭玉其質教以一經兮是訓是式富春之渚兮漫而不激有魚可釣兮鳬雁可弋翁居於是兮天之所隲鑿井而飲兮耕田而食仰事俯育兮不知不識窪樽兮吸吸土鼓兮秩秩優遊卒歲兮皆仰蒙乎帝力高車駟馬兮非豫心之所及五言律詩暑中招客二首長夜不可度鬱陶自難開衣冠嫌褦襶樓觀想蓬萊赤日天中過涼風湖上來非君一命駕誰與共傳杯江山猶故國風月自間人老至謀生拙時更盛化新花疑春似夢酒與道為鄰柱史猶龍者何嫌有此身五言排律虀館詩有序省掾李仲常儒者也喜蔬菜每年以時治百餘品候開歲正月人日會郡中諸儒士為虀館之會時豫為左右司員外郎以斯得忝座右索賦其事虀館常年會辛盤此日傳鷁飛慚落羽鯨吸感流年白髮干戈裏青雲談笑邊晤言寧解后接席亦因緣列爼餘珍味登筵總俊賢玉壺延淑景綵筆詠春天上客歡先醉狂朋喜欲顛梅懸金勝小燭照錦袍鮮起舞交為壽疑年各自憐主人情更重屢賦鹿鳴篇送天使僧釋子承天語儒臣撰寺碑萬間靈谷建一切布金為寶界山河大璇題雨露埀丹青人所仰壯麗古無之鈔幣勤中賜恩榮拜曲施文章尊典誥億兆頌皇基鶱舉鸞回筆光華鳳吐辭繡幢天上遣金錫日邊移赫赫瞻行邁遙遙賦再馳在公無候謁於禮有嫌疑道路承傾蓋言辭見誦詩斯須如久要造次亦委蛇宗廟觀罍洗雲霄式羽儀乃知修白業動徹守清規空谷行春律餘生共聖時頂祈摩佛手目願覩堯眉慶讃諸天會觀光夙世期叩頭雲陛逺舞袖草堂卑枝繞貪生鵲池支服氣龜暌違難折栁嚮仰只傾葵復命蒼龍闕覃恩白玉墀握蘭前席對視草近臣知仙樂停宫扇天花散殿帷一人膺大慶萬宇受繁禧立雪時將至拈花事未遲有緣皆弟子無念不慈悲軟語敷甘露清齋却紫芝頻煩尊者問慚愧老夫衰在德寧忘報惟心不可欺朝宗江漢水日夜注懷思可間老人集卷二
