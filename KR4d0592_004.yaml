body:
  text: 可間老人集卷四眀張昱撰宗陽宫次楊仲𢎞老君臺觀月詩韻當時諸老宗陽會月與浮雲幾變更丁令豈知為鶴事道人猶作賣花聲天溥露色開蟾境秋送商聲入鳯笙誰信紫薇垣內客今宵又復到蓬瀛送康穆庵赴福州能仁寺席佛運興隆此一機尊師何負七條衣講經春殿人天衛咒鉢夜堂風雨歸花為散來春冉冉柳從攀後思依依幽蘭荔子南方物籠護函封寄莫稀病起花事能消幾夜風櫻桃葉底又深紅豈無金縷湖波上間却玉杯春雨中枕上楚雲元是夢鏡中潘鬢惜成翁莫言輕薄揚州事著意題詩也未工題雲林隱居圖為崔彥暉賦崔郎志趣在雲林筆底遙岑自淺深欹枕不忘圖畫事開函又動隱居心粉痕白白生雲氣黛色沉沉覆樹隂幽思不教忘夢寐耳邉長似有猿吟留題費山人舊館舊館經過不用期掃門常恐鶴來遲但知重客唯司馬不顧狂言有牧之秋雨石枰看對奕夜堂銀燭照題詩佳人底用千金産只此髙間可不知經鋤齋誰似談翁樂有餘百年生計秖林廬甫田種熟門前稻暇日抄成架上書睡起謾憐衰甚矣客來唯問近何如相過里社尋常事只把柴車當酒車謝寶林寺别峰法師惠僧履也知鰻井猶龍井合有交遊似二蘇起舞謾憐成短袖徒行始覺是窮途書從堂上出雙鯉舄向雲中墮匹鳬無復舊時公府步君門望絶沒階趨宿郭子振雪洞月光一色杳難分不見丹青藻棁文蝴蝶飛來疑是夢梅花開後却思君都忘長日將紈扇猶恐餘寒到練裙宿酒覺來看不厭滿牀秋思白如雲答韓介石提舉偶持尊酒對花傾有客能來道姓名佳句才探出懷袖故人知是不公卿平生學劍心都懶此日歸田計可成彼此頭顱俱種種題詩那得不關情冬日白牡丹律琯催春到牡丹行雲欲墮碧闌千似嫌脂粉能相汙故逞肌膚獨耐寒雪艷最宜金縷蓋天香合是玉雕盤趙昌花鳥新馳譽畫作屏風後面看老圃堂不謂斯時有此翁無能田畝纍其窮異蔬自灌欲百品老圃官量無十弓草閣曉梳秋髮白玉杯春醉夕陽紅餘生儘可忘榮辱事與樊遲請學同鄒將軍挽詩為臣豈欲國傾危莫把天戈挽落暉一死得埋元氏土寸心無愧首陽薇安居食祿當時貴守節酬恩此日稀老我常從大夫後題詩為爾淚沾衣同貢有初觀潮賦舊時八月潮生日士女傾城出看潮秋唾似從天上落晴歡宜向酒中消氣爭鳥道為森爽勢合龍宫亦動搖今度可憐成獨往海門斜日共蕭條自賦陽酒徒今老生早年擊築和秦聲許人不負一諾重買笑惟恐千金輕花間駿馬銅鑄出枕上愛姬雲化成誰信青門種瓜者自梳白髮向秋晴僧惠炬有悼黃溍太史偈次韻保叔塔日鼓西沉逝水東他生還有此生同蓮花社豈知元亮茅屋詩曽詠已公夢幻已空身外蝶文章猶鏤蠧間蟲間情最是山前塔日夜風鈴語未窮寫易軒為方以愚賦不於闕下寫文星天與冥鴻惜羽翎人世誰為雙鬢白家山自是亂峰青霞分曉色留書几斗轉寒光落研屏觀象玩辭從寫遍方干何忝舊眀經挈家圖為尤仲斌賦葛洪挈家赴勾漏何異龎公歸鹿門擔頭何有琴書纍牛背未覺妻兒村千古清名不易得一斛丹砂何足論大勝齊侯馬千駟令德曽無遺子孫悼王自牧貴賤交遊二十年忍將老淚灑新阡蓋棺不必論身後入室猶如在眼前一首詩今為爾惜數行志在得人編錢塘吟士長相望潘閬林逋孰後先思橘軒為悟空叟長老賦侍書遺墨函封在思橘名軒示不忘往事百年同逝水斯文一語有餘光風流大抵輸前輩臭味還應是故鄉嘉樹未知培植後只今百果許誰嘗逺翠樓為殊無别上人賦坐來未覺西山逺紫翠千峰隔畫闌此處豈容擕酒到任誰只得捲簾看雪晴黛拂蛾眉緑雨過螺堆佛髻寒分得半櫺間拄笏牀頭寧復更彈冠早行涼風滿棹賀湖邉越上諸山盡可憐逺漢片雲承落月長林匹練曵輕煙忩間織女燈猶在井畔啼烏客正眠何處間愁隨夢覺一聲菱唱發前川次韻周昉大尊堂上幾曽空客有登門道未窮吟鬢肯因愁裏白舞衫偏愛酒邉紅百年喔喔雞聲月萬事悠悠馬耳風及此舊遊情分在儘將春付笑談中贈沈生還江州鄉心正爾怯髙樓况復樓中賦逺遊客裏登臨俱是感人間送别不宜秋風前落葉隨車滿日下浮雲共水流知汝琵琶亭畔去白頭司馬憶江州贈寓客還瓜州把酒臨風聽棹聲河邉官柳緑相迎幾潮路到瓜州渡隔岸山連鐡甕城月色夜留江叟笛花枝春覆寺樓箏贈行不用歌楊柳此日還家足太平無題灼灼庭花露未收樂然雙燕語綢繆新粉滿面猶看鏡殘夢關心懶下樓春到自憐人似玉困來誰問酒扶頭狂蹤已作風絲斷敢怨流年似水流與白範論詩白家少傅諸孫在坐語都忘日晷移不用入吳求季札有如過晉得鍾儀髙情欲共遊絲逺倦迹猶嫌過鳥遲莫道古今風雅異總于衰晚始相知冬至日次張太守韻喜色輕黃未上眉且將心事付遊絲嵇康取醉非關酒杜甫長吟不為詩一線日長宫女覺五方雲應史官知人間梅柳關春事次第從教律琯吹對雨好是西湖醉後聽打窗驚柳隔堂屏鶯花又送春光老鳬藻偏涵雨氣腥曲按銀箏何太急杯行玉手不須停尊前便是巫山夢莫道行雲事未醒趙松雪畫苕溪清道圖吳興元是水晶宫樓閣溪山罨畫中酒舫載歌寒食節舞衫吹遍鯉魚風當時樂事誰能見此日王孫自不同亭下鷗波如有感行雲猶在玊尊空寄胡侍御後市街頭相見稀此翁真是早知機浮沉里閈陶彭澤輕易官資白紫微小妾畫堂楊柳曲髙年白髮薜蘿衣風流莫負持螯事越上湖田蟹正肥次韻張都事老却樊川杜牧之風流誰賦柳絲絲不關請告來歸早惟恐尋春去較遲畫舫行時長載酒粉牆到處即題詩至今留得狂名在唯有纎腰弟子知謝僧惠蒲履大夫此日可徒行蒲履深煩寄逺情除是髙僧求易得自非巧手織難成春來見客身差健老去看花步覺輕他日袈裟如過我定須著此出門迎寄羅博士莫説文星與酒星已同傖父泣新亭夢中此日頭能白海內何人眼更青鵑化羽毛猶姓杜鶴歸華表尚名丁縱然記得前朝事彈向銀箏只自聽荆溪漁者為義興道士賦千尺荆溪徹底清水中無復見蛟行要同雲鶴間蹤迹自放煙波隱姓名濁酒忘形浮世內青山到眼緑蓑輕醉來放棹回船去撫掌風前詠濯纓留題徐子方客樓仙遊到處即淹留雖是孤村境却幽松下野雲間似鶴門前溪水淺宜舟琅玕夏簟兒能設琥珀春酷婦可謀連日小樓忘客況放翁凡事頗清修周元亮夏景安同過夀安堂提舉乃翁墓上作蓋棺事了若堂封起伏諸山接過龍解劍會曽心自許脫驂非惡涕無從每分藥餌扶吾老竊誦文章笑道窮朱紱在身忘宦況前朝猶有古人風題眀心海上人别弟詩後弟兄天性本同符逺涉能無一慟乎浮世有身真大患回車無日始窮途秋巢不宿烏衣燕夜屋偏憐白項烏切莫臨風揮老淚血痕能染紫荆枯次韻雪鶴生惠紅米詩相望只在片雲中自昔神交意已通書枉鯉魚烹後素粒分鸚鵡啄殘紅回車三徑豈無日放棹五湖須便風知汝有期林處士尚留殘雪待春叢雨中過蕭山誼上人别院雨棹茫然出鏡湖客行偏爾畏泥途僧中果得竒男子我輩真成賤丈夫重席自能為我設大尊不用問人沽從容暖閣得佳睡此意支郎世有無送上虞馬訓導赴昌化縣學逺赴弓旌未濶迂道行何憚路﨑嶇橫經不異郡博士繼粟豈無卿大夫空使飯盤堆苜蓿已將齋帳染芙蕖馬融家法風流在女樂從今不用呼寄湯隂張丞萬古銷況入望中悠悠往事付征鴻湯隂風俗今何似鄴下文辭誰最工爭得不教雙鬢白别來屢見小桃紅貴遊年少輕鄉曲不賦停雲寄老翁無題四首幾夢郎君引碧幢微波難與寄沅江青春每念青絲騎白日長間白玉窗菡蓞結房雖有異鴛鴦織錦不成雙潮來好是兒家恨流過門前氣未降萋萋芳草被江臯好是王孫去日袍幾許春魂迷蛺蝶近來酒量減葡萄音書已似題黃絹蹤迹何因夢大刀可惜百花時節到伯勞燕子不相遭咫尺香閨步懶移搔頭誰理玉蟠螭不聽小管吹銀字只數回文織錦詩得伴有時惟鬭草遣懷無日不彈棋鳴鳩乳燕青春晚謝却繁花幾萬枝水心亭館迥無鄰好與郎君寫洛神不見鯉魚烹後素空憐蝴蝶夢中身萋萋誰信南園草渺渺豫懷北渚春雲氣長連峰十二此中消息未能真雪庭為龍華閣康上人賦請教雪庭誰是雪雪消應始我初心問知達摩來東土唯有神光在少林清淨觀空三昧見吉祥風軟六花深半空挂在羚羊角蹤迹無因向下尋與金冕言詩天然秋水出芙蓉造物何言與用工風雅遺音自鳴鳳齊梁餘習盡雕蟲性情敦厚思方到句法雍容律始同沈宋後來俱作者幾何人辨四聲中桑梓圖為徐復初參政賦望中煙樹是黃州城繞江波總舊遊桑梓能忘丘壠念夔龍分屬廟堂留牛山雲樹依然在魚水家聲尚可求他日賜環當有勢題詩却寄鳯池頭寄陳允中僉事得放還家休便休更無褒貶到春秋景公死日有千駟晏子相齊惟一裘朱紱既能從爾去黃金不必為孫謀何人得似歸來鶴見彼纍纍土幾丘樵雲詩為李文彬參政賦赤手樵雲直至今此雲已獻九重深萬方允副從龍望五􅊶長懷捧日心上接爐煙通御氣淡籠宫樹合春隂自調玉燭歸玄造非霧非煙何處尋題崔純一處士遺像處士於今舊勿論通家三世見甥孫鍾情更為何人慟出涕方驚老眼昏南塢髙墳深宿草東牀佳壻見清門丹青有筆開生面底用名香為返魂耕樂詩為許起宗大父髙士賦人生不仕即歸田夏屋渠渠艮渚邉僮指計傭將五百牆桑成樹過三千食前甘旨惟孫子門外軒車總俊賢隱去更無城府迹鹿門髙致後千年采藥徑為方德逺醫士賦藥徑香風作陳來日扶長钁為徘徊緑憐地錦經春在紅覺山丹冒雨開本草有名俱用識仙巖可采不須栽尋常踏破蒼苔處多是門生種杏回送張經歷之敘州别酒無嫌醉似泥敘州又過洞庭西雲濤浩渺連三峽井邑凋殘接五溪雪嶺侵天無雁到楓林蔽日有猿啼憑誰喚醒王褒夢除是陳蒼碧野雞題奎方舟講師影堂火風假合作天親埀老空門哭故人四句偈留辭世法一龕燈照坐禪身收來舍利藏生玉散到天花照爛銀銘塔祗應徐博士備知僧行刻堅珉命酒徴歌送余壻時伯庸酒間賦贈董景眀董彥禎諸親還遂昌髙堂儘意樂今宵未可樽前自寂寥錦瑟年華青冉冉銀河秋思碧迢迢紅於燈下看偏好黃向眉間喜未銷眀日早潮隨去棹到家應及鵲成橋次韻張郎過大眀湖詩湖上荷花五月涼水心亭館晝收香狂來借手傳鸚鵡俊發教人唱鳯凰零落翠盤風雨後凄涼歌扇水雲傍凋殘闕下休惆悵看取咸陽與洛陽題莫景行茅道士棣華碑賦茅家兄弟學仙遲不見春風長紫芝桃熟海山還有日鶴歸人世更無期遊魂渺渺知何在荒塜壘壘盡可疑惟有夕陽如舊日照人來讀棣華碑寄張來儀徴士九江人湖州寓客張徴士珍重風前詠落梅錦瑟可容彈别調白頭只合付深杯安期棗在神人去曼倩桃空阿母回看取漢家汾水上年年惟有雁飛來杏軒為倪伯溫賦别屋軒窗絢綵霞董仙曽以杏為家邦人為種幾多樹春雨每開千萬花門外清隂遺世澤酒邉丹實賞年華煩君愛惜題詩壁莫遣輕塵上碧紗琴鶴幽居圖幽居琴鶴以怡情童子何知預我清羽翼如傳兩階舞徽絃為和九臯鳴山林在昔多迂士畫史何人有重名好托丹青留後日莫忘清獻舊家聲林泉讀書圖王叔明畫髙情自愛樂林泉華屋藏修度嵗年書簡韋編曽幾絶硯盤鐡造亦磨穿牙籖插架封藝葉銀燭臨窗散蠟煙黃鶴山樵如得意丹青為作畫圖傳大雪留飲沈晉卿家有客相知感嘆頻白頭似與雪相親鍾情好語既莫逆快意深杯忘幾巡老至欲求餐玉法病來不厭散花人從他柳絮因風起簾幕輕寒不似春春夢軒為江西按察司書吏張永年贈别百年妄引幾曽停看取池塘草又生蝶戲落花真自適鶯啼深院欲誰驚盧郎此去應如願宋玉從來最有情一枕好風吹酒覺不愁春夢不分眀戲贈楊維禎儒司常自稱楊夫子故云懶散情懷是索居非關故草絶交書空謀赤壁一斗酒不寄雲間雙鯉魚近日西河疑子夏幾時漢武問相如文章固是雕蟲事請教何人力有餘題端古堂為陸敏賦女媧錬餘五色石藏在端溪成紫霞天遣六丁神琢硯夢中一夜筆生花品題猶是宣和刻文具今歸陸敏家未覺曲江居士老尚能記事墨塗鴉題僧超然林石灘水圖公事賦詩紀行役超然著筆良苦心匡廬哀湍走大壑洞庭橘葉辭空林品題六印文章在流落三朝嵗月深博雅不煩為鑒定人間過目盡知音題渌繞軒海濱綿邈人家海上村潮頭過處與開門逺山對面如小畫渌水繞軒清不渾天濶煙雲迷去鶴時來風雨起遊鯤槎回定泊闌干外坐挹雄風倒大尊次韻吳子立湖州船中詩一種湖州罨畫船碧波倒浸晚霞天故人總是三生後風景何如十載前逺樹白雲橫暮嶺淡煙黃菊滿秋田吳郎似為才情惱費却銀鈎幾幅箋謝張别駕惠雪箋承惠薛濤三百幅甚慚何以報瓊瑶開緘只恐為雲去入手生愁向日消難用侯門裁刺帖秪應仙洞寫雲謠知君解綬初歸隱叢桂辭成未敢招百丈泉為及以中長老賦道人手挽銀河水瀉作空山百丈餘當畫大聲喧醉枕長年倒影浸禪居玉虹挂石看不滅紅葉乘流畫却如陸羽茶經知此味可能日給到吾廬題天龍寺叢桂樓天龍樓閣迥無鄰玉斧修成月滿輪受質豈無如郤者觸機還有姓黃人香通三昧惟心印花散諸天盡法身誰把碧雲題樹葉惠休詩句本清新芳林農舍為朱孝先賦投老歸休只此心渾家農事在芳林蒲生曲渚魚苗上蛆泛窪樽酒力深應候微蟲窠作甕啼春幽鳥語如琴眼前物色皆天趣底用城居積萬金務勤堂為俊冝之賦民生在勤則不匱爾以務勤為此堂百畝田苖終嵗望一春蠶事舉家忙課兒雪夜溫書册會客花時列酒漿黃絹下機倉廪實任從懶卧北窗涼灌園生為潘時雍賦却惡喧囂逺市㕓自耕荒僻浙河邉時非蘇子投書日鬢是潘郎作賦年飯客夜舂鸚鵡粒灌園春引桔橰泉塌然鼾睡茆茨下榮辱何因到爾前送趙惟一貢京師會試過却龍門總是雲凡魚回首盡離羣風雷忽起三層浪毛骨都成五色文螢火幾憐車胤聚桂枝獨許郤詵分臨軒策試當條對毋以虛文負聖君請復朱娥廟詩上虞朱回有孝女十嵗過於烈丈夫義感皇天存祖母身輕白刃禦強徒朝廷既已載宋史民德從之厚海隅事上太常須有議肯教無廟薦潢汙奉萱堂為陳彥廉綦履鳴環左右間佳兒佳婦及承歡天回白日臨瑤席風約紅萱壓畫闌小管注春情婉婉長裙曳翠佩珊珊孺人貞儉存家訓不使屏帷繡孔鸞十二月白牡丹為吕經歷賦章貢瑞金人前奉禮郎濠泗蒙恩得放回牡丹猶寄舊亭臺忽驚花向臘前發却是春從天上來歡動山城傳好語兆徴幕府得良才靈根自是南方種只合移歸上苑栽與胡奎言詩詠歌終日莫豫違可與言詩竟日稀風雅不刪真妙製性情所得是天機盡知金翠塗屏雀未見丹青畫衮衣杜甫當年評衆作鯨魚碧海敢云非題白雲丈室空門真足了吾生一到翛然萬慮輕下榻偶然清話久推窗唯見白雲橫銀煎瀹茗沙彌黠宿火添香侍者清甚愧主僧知我輩碧紗新染待題名留題天目尊師并題蒼古詩卷蒼古仰聞君一語當時巖壑頓生春承恩屢入九重殿出對常先十七人中使飯傳諸寶器內庭坐賜雜花茵自天沛澤誠稀遇拜舞還山洗幻塵元日大雪東風吹雪逐年新洗盡街頭萬馬塵桃板謾題新得句椒觴偏醉少年人江山未覺非前日老大猶憐有此身稚子老妻能慰藉辛盤聊復賀青春搜索舊稿有感抖擻蓬塵紙一窠束之髙閣又何多百年公論竟無定千古文章將奈何大雅未應終絶響離騷可謂極頺波仲尼刪後詩三百誰與升堂取瑟歌癸亥立春在壬戌十二月二十五日一嵗兩春應是閏自題春帖自相憐茍全性命君之賜痛念文章兒不傳隨俗辛盤惟赤手省思舊物只青氊土牛雖送餘寒在未可重裘換薄綿元旦試筆鳴玉趨朝已不堪白頭早賜老江南從心所欲過八十屈指可談無二三獻歲屠蘇增甲子發春萱草願宜男兒扶拜答鄉人處只誦猶龍惟老聃金山寺六鰲捧出法王宫樓閣居然積浪中門外鷗眠春水碧堂前僧散夕陽紅揚州城郭髙低樹瓜步帆檣上下風人世幾回江上夢不堪埀老送飛鴻過周昉草庭有感深青淺碧自盈盈一片光風共晚晴意思不殊周茂叔品題何藉鄭康成郎君東閣詩曾詠蝴蝶南園夢又驚轍迹到門憐草色白頭扶下小車行郭將軍妻李氏挽詩夫能以義徇孤忠家國綱常事則同中閫不踰貞婦節大家何啻古人風機絲已斷塵燈在木主新題繐帳空博士已銘墳上石九泉深慰若堂封送徐生還台州徐氏樓船且莫催當筵有酒更徘徊山留倒景日未晚雪滿大江潮正來黃葉盡時尋雁蕩丹霞起處望天台楚人自覺多秋思懷抱今因作賦開安晚堂有酒如澠不用謀阿翁只合賦三休鄉閭可杖容稱老晚節能安自不憂絲竹間情信陶寫起居惟適是溫柔百年耆舊今誰在且醉官窑大白甌飲吳令家膠漆相投古亦難酒間何事慘無歡苦愁海底量深淺痛哭燈前出肺肝白首既辭當世事朱絃何必向人彈醉來渴甚思吞海無復天家小鳯團舟中寄謝别峯南翁二尊師為師傾倒盡雙瓶船過柯亭酒始醒索笑始知髙士去題詩猶愛越山青交情舊雨同新雨世事長亭復短亭恨是柳遮樓上笛只教向秀隔煙聽寄馬孝常時新得妾好是吳門馬孝常百年俱是夢中忙謾慿青鳥往相問説道白眉今更長陽羡故人俱契闊鯨湖歸棹又相將重來定及先春雨要試陶家雪水香獻嵗旦日同芳溪吳理問訪許處士月旦泛舟從許劭蓮湖溪水白生煙到門好雨過雲去説劍雄風生酒邉間話紫衣成昨夢醉看烏帽惜餘年懵騰不省臨流别想是行雲扶上船留别姻家吳子道理問時側室失歡記得湖船醉夜深交情何啻斷黃金通家敘舊猶前日把臂迎歡共此心秦女鳯簫移别調楚人芳草動微吟眀年不待梧桐雨來聼髙堂鼓瑟琴題韓處士墓銘家譜後處士本嵊縣竺氏子繼韓為魏公九世孫受業莊節韓眀善先生竺韓俱世姻處士連姻俱相門學傳莊節道彌尊幾編家集文章在十世宗支譜系存猶喜繼韓能有子尚憐承祭見諸孫頃原瞑目知無憾手録清規付後昆挽崔彥暉母趙夫人趙文敏公之孫女情忝通家見嫁時環珮盛儀猶內院波瀾餘澤自天池佳兒裕蠱承先志淑女冝家副夙期已託文章題琬琰百年墓木照豐碑初至芳溪義興罨畫溪頭雪水渾是誰酒舫過溪村故人見我即握手步雪看花直到門倉卒傾銀開內閣從容移玉出諸孫餘生愧忝通家舊委曲文情可盡論吳子道同兄輩嘗子鵝張旭何嘗是酒徒深煩為我作春酤酒行天降盤中露鵝割囊封塞上酥迹逺五湖身既隱醉歸三徑子能扶南山逺對東籬菊除却陶家别處無梓軒為湖州曹生賦當軒雙梓碧沉沉直幹凌空過十尋客到不妨為少憩風來或可助長吟百年大用充梁棟一日希聲中瑟琴冝子毋忘角弓賦將期奕世共清隂同韓介玉過月溪上人玉雪軒髙僧習聽之所在繞院竹梧生晝隂此境應居玉堂側是誰移置雪山深銅瓶薝蔔不自供碧碗醍醐為我斟老得一間君所賜小車隨處有山林次雪鶴生詩韻詠海上歸俗僧新安失節婦北窗晝眠驚叩門詩筒逺寄願所聞太學鄭虔固三絶小字李潮仍八分湖上好懷非往日枕邉殘夢是行雲兩年屢有清遊約幾似空言以屬文雄鳩鳴雁即天涯未覺藍橋去路賒夜枕不迷蝴蝶夢春衫深染石榴花千鍾縱意伯倫酒七碗清心諌議茶錯向牆頭窺宋玉風光元在魯東家贈湖州楊均顯製筆當年馮陸擅吳興曽許楊生繼盛名三館每蒙諸老重萬鈞不博一毫輕歸來未覺江湖逺落拓寧知嵗月更頴也此時須自薦國家用爾頌升平柘軒詩為教授凌彥翀賦滿軒桑柘共生成坐愛春風向日榮五畝宅思鄒孟子百年心慕李延平葉供蠶事誠何損衣被民生獨用情中有如綸絲五色願從衮職補升平武陵嚴子英家世善製筆嚴應始以筆治生至今孫子大其名用世雖云四寶具傳家貴在一藝精東郭之㕙即毛頴南山有竹俱管城器利天下功不有慎守其業毋自輕昌化縣學訓導章琛抄録武林郡志還鄉唐相郇公尚有孫不將家世忝斯文髙堂别席事抄録小帳停燈校紏紛脫稿近知將解局疏麻擬折遺離羣武陵郡志多竒事歸對諸生誦所聞示山中白雪牛耕田世界絶纎塵白玉毫光照爛銀蘆葉膝邉穿得過天花背上落來勻狂蹤未定難眀性妄想俱空始見身驀直絡頭如不錯也須慚愧執鞭人過上虞仙姑巖觀瀑布泉作誰把髙崖手劈開巨靈還到此中來青冥風露銀河近白日雷霆碣石摧潭上龍漦溥絳雪廟前馬迹過蒼苔猶勝漢使經年别載得河邉片石回深雪齋為金西白長老賦道人宴坐維摩室積得天花似雪深眀月有輝同大地白蓮無影到東林抽毫司馬應難賦斷臂神光或可尋落絮遊絲紛滿眼從教門外作春隂書藥舟為湖州沈玉泉架閣賦溪上香吹白藕花沈郎舟楫自為家雙鬟蕩漿乘流去小榼留人易日斜采得録荷成野服博來紅米是丹砂綵鸞韻寫松煙墨不與青蛇道士賒西湖晚春憶昔東坡為寫真至今詩句在遊人朝雲猶是當時夢桃葉渾非舊日身鶯燕情懷千語少魚龍波浪幾回新傷心誰問林逋宅零落殘梅共晚春留峽石朱山人家桃熟許同朱老喫却先桃熟為開樽白魚入饌溪鱗足紫茁堆盤野味存詩和淵眀為我誦酒沽若下勸人溫迂疏且作須臾樂從者何嫌久候門海昌雙廟同張太守次壁上題韻孤城請援待王師保障真成纍卵危作厲誓將擒賊去分羮何惜愛姬為忠臣盡命以報主信史大書無異辭三十六人同日死獨呼南八作男兒趙松雪墨蘭玉廬墨妙世無同九畹髙情更所工捐佩昔曽過澧上浩歌今望在雲中娟娟奕葉承家澤淡淡幽香媚國風莫把騷詞煩宋玉賦成還到楚王宫松隱軒誰拜青松作大夫蒼然離立自迂疏風聲白日廽幽夢雲氣長年到隱居剪葉浸泉春釀酒截肪點火夜抄書嵗寒卉木俱零落一杖人間不願餘剪韭軒為韓叔賢賦魏公七世孫故家不貴味能真率爾蔬醪自可人既向畫堂題剪韭更將玉斗出娛賔青青葉綰指環小白白頭攢乳管勻還是相門風致在食前誰謂庾郎貧南坡書室圖為竺郎中題竺為朱文公外家南坡書室未能還一夕情生夢寐間職任握蘭居紫禁心隨畫筆到青山一經教子今何忝九世為儒古亦難家集河汾來學盛豈無房杜出朝班天香室為定水寺復見心長老賦宋楊誠齋與定水僧璘公有鄉里之好璘以桂作餉誠齋答以七言詩刻寺中雙峰桂樹今無似説道璘公有後身金粟如來能作主碧山學士願為鄰天香入餉清可食秋露染花黃未勻何惜一題方丈室與師同是豫章人送星翁甘碧泉挈家歸彭澤縣睽離心事正忡忡執手何能别此翁葭菼戰秋江雨白鷓鴣啼曙嶺霞紅貪狼斗柄才加戊織女雲車又向東我憶陶潛舊鄉里到家休負菊花叢蛟門春色圖為定海王宣使題風景蛟門春更佳晴來滿海是雲霞鯤鯨已入任公釣波浪長隨漢使槎天上星辰歸畫省人間歲月屬桃花仙人自有雙鳬舄弱水蓬萊路未賒暘谷軒為王知事賦地入青徐眺望賒雲中雞犬有人家金烏五夜出暘谷玉燭萬方瞻日華李泌成仙還作相劉安得道只餐霞軒前儘種扶桑樹不比玄都觀裏花寄贊禮郎趙惟一六年讀禮足艱危知爾朝天副所期宗廟正需瑚璉器羽儀今集鳯凰池見辭舍館情俱惡憶上河梁步自遲能慰老人思望切停雲還有寄來詩靜菴為陳令賦潘嶽賢能邑大夫老成諳練實難如治心有術惟清靜臨政從公絶毁譽情寄堂琴民自化樂同時物雉隨車循良在昔多徵拜信史班班不誑豫雪庭上人惠藥資是經錢賦此以謝牝廬居然欲半年甚於水火觀中禪死生有命固無懼老病他鄉始可憐家食舊非鄰院米藥資今受施僧錢數間破屋叢書裏誰問洛城盧玉川問牛軒為海昌北寺訥無言書記賦犀牛不逐扇俱破奈有人來問此軒資福無端添注腳石霜何事未忘言大千無迹身俱化一點通眀角尚存拈起家風隨手應莫言無可付兒孫春草堂為陳生賦可教遊子不關心白髮髙堂日已深憂對宜男雖可忘情同烏鳥若為禁詩書養志勤三省甘旨承顔抵萬金執答春暉憐寸草孟郊詩句不堪吟蓬萊道院雲近蓬萊蜃氣銷數峰晴照逺相招梁間燕子都歸去觀裏桃花自寂寥盂飰化人忘戀戀院牆篁竹謾蕭蕭雲中何處劉安宅猶有雞聲報午朝演法師惠紙帳銀燈夜照白紛紛四面光搖白縠文隔枕不聞巫峽雨繞牀惟走剡溪雲風和柳絮何因到月與梅花竟不分塞北江南風景别却思氊帳舊從軍題天鏡方丈為能仁淨秋江長老賦大宗大𣲖接秋江砥柱中流露法幢照世萬緣俱是妄行天一鏡迥無雙當家誰道非臨濟説法還須在老龎驀地繞牀三振錫更無言句兩心降寄東山寺長老宅區中索畫梅同是多生無垢身孤芳嵗晏轉精神濡毫應覺香先到寫影無如月最真庾嶺近來還有信花光以後更何人情知此事難描畫驛使空回可不嗔冬青軒為天印上人賦冬青樹老法王家得與維摩共嵗華枝上蠟封經夏雪階前雨積過春花詞人有興從題壁童子何知但煮茶不下禪牀迎送拙大千同是一袈裟寄題松風海月方丈為普慈寺林清逺賦普慈寺主會當年畫省雙鳴赴法筵風過忽聞松上雨月行不離海中天三生身性何曽改一念聲聞總是緣先輩往還成故事玉圍曽解寺門前集雲軒妙嚴院主斷聲聞密室圓光覆樹雲牀下虎心俱化善階前鳥迹自成文池窺片月遺空相樹接諸天散異芬傳誦六時行道處至今軒户集氤氲西疇為陳生賦負郭有田何所憂每年春事在西疇耕回收犢繫牆角客至呼雞下樹頭織女機邉祈杼柚天田星下祝甌窶豳風七月詩歌罷土鼓窪樽樂未休題寶林方丈留别伯舉法師金相浮圖千級開雜花如雨在莓苔要看彈指成樓閣未許胡僧話劫灰法器即如廊廟具寶林自是棟梁材雖然一片袈裟地不是兒孫不可來寄報國寺東堂止菴祥尊師覔船直欲橫塘去船去橫塘為訪誰白首正慙玄度老碧雲曽與惠休期山林此日多髙士風雨連牀可論詩入社既能容載酒陶潛無復更攢眉玉岑舊隱為林叔平賦齋館枵然題玉岑老生時作越人吟曰妻曰子留他土維梓維桑念故林豈謂青雲天上逺漫憐白髮鏡中深古來儒士多遺憾為此文章竟陸沉古村為曹迪賦宋曹利用之後人魏國南來有子孫至今人物古而村松根曲處安琴枕山石窪中注酒樽汲冡文章遺竹簡秦人風俗尚桃源海波不接天河水要得仙槎徑造門思雲圖為羅從事賦抽毫據爾賦思雲為感羅含以孝聞職任紫垣親不逮粟支紅腐祿無分終身有慕誰非子此日移忠正在君郎署丹青稱髙步須求名筆記斯文贈寫神朱大年筆頭何在覔人知鏡裏相看不自疑麟閣盡能圖燕頷龍沙誰復恨蛾眉千年名姓毛延夀一代丹青顧愷之夢感九重終見召藝精寧患不逢時送别唐克讓還家家山逺在白雲邉膝下相違又隔年萬里壯遊司馬氏數函書畫米家船裁成綵服歡無已遺却瑶華思惘然海內故人零落盡别離多付酒尊前寄表兄蕭文索處士七十餘年親弟兄書來堪喜復堪驚杯中酩酊無虛日枕上邯鄲過此生老至音書冝有數别來骨肉若為情遭逢洪武開新運又十三年見太平克讓許寄酒詩以趣之春至遣懷惟恃酒莫教花發酒來遲文章每與年俱進世事還於老始知海嶽幾時吟雪夢岑陽有約采蘭期古音最愛朱絃曲彈到髙堂念别離月軒為張令賦思親對月清宵坐了却公家事可知白髮已無重見日清光還有再圓時葉間零露皆成淚忩外栖烏總是悲大孝終身俱有慕不辭為賦蓼莪詩寄湯水嚴仲原處士情忝姻家亦是緣人來無不問湯泉間常采菊東籬下每望長安西日邉素業魚鹽滄海上綵衣孫子畫堂前髙車况是京畿內受用髙年五福全孝友堂為姚氏彥名彥昌昆弟賦兩生孝友誰不知左轄題堂固所宜豈獨聲名從此大要教風俗與之移棣華煜煜照春日烏鳥啞啞啼樹枝林植羽棲俱有感過門賔客可無詩瀼東耕者為社友黃成章賦鹿門不道似烏溪榆柳連隂覆大堤常日墟船潮上下每年春事瀼東西勸農隨例拜車馬觀稼依稀從杖藜牛角挂書吾道在古來力食盡男兒寄王元吉楊東叟二處士華亭猶有古人存風景依稀似鹿門一曲晴湖通畫舫萬株古木出烏林卜鄰王翰俱文物識字揚雄足酒樽有約重來訪東叟徴歌同樂最間園席帽山人所居寶古齋曹昭寶古以名齋韞櫝非時不一開圖畫丹青半人物尊彞文藻盡雲雷流傳竟自何人得玩賞知經幾手來世故浮雲眼前事題詩投筆為興懷雙桂堂為俞子成賦雙桂團欒對兩楹碧雲無數共生成却生片玊曽馳譽竇氏五枝俱向榮奕葉至今傳世澤靈根既老際文眀會須滿袖天香裏載酒髙堂説姓名送廖思誠知安肅縣新恩領縣之安肅便道寧家孝使然親舍戀深雲白白官程期速馬翩翩人民社稷上所倚期會簿書勤是先政考有成俱大用到官知爾又春前聽泉軒為龍井智法師賦山僧聽得泉聲好每夜坐忘清夜深松上落來驚鶴夢潭中瀉下雜龍吟觀心已淨平生垢到耳能空見在心此去涓流如不息沛然誰禦海鯨音聽律令鄉飲回贈劉復齋馬𢎞道晚步河橋念此身餘生猶幸齒編民府城無迹非為賤松菊猶存未是貧官府才聽新降律酒壚先問有錢人衢歌仰詠唐虞化鄉飲俱前老縉紳梅竹軒古梅修竹兩相親坐對髙堂如大賔空谷有人憐翠袖雒陽無夢染緇塵嵗寒清白能同趣日暮平安是此身三友若能同此隱門前楊柳任芳春晚出西湖畔會葉舜臣自運司中出武林耆舊似公稀未覺文章與世違節序去人驚逝水柳隂當面轉斜暉羣鷗晚戲呈天趣孤鶴宵鳴自道機早作餘寒冝晏出為嫌多露濕荷衣悼孔英夫提舉孔子五十五代孫老淚何堪哭寢門斯人况復是斯文六經政爾傳家集曲阜蒼然掩暮雲鬱鬱澗松看得地昻昻野鶴又離羣賢郎無忝家聲舊能以文章繼世芬修淨慈寺成賀簡以道長老古佛毗耶願海深萬間彈指變黃金分明兜率諸天境慶讃閻浮施主心堂上鼓鐘聲大地域中龍象盡知音自應雪夜傳衣處不獨神光在少林送沈敬止赴胄監老態頺然厭世氛喜看賢者步青雲事君如得行其志出對還當罄所聞列宿九霄餘氣象靈芝五采絢人文滿朝侍從皆英俊始是文章可策勛鄭竹隱處士墓上作何慚南渡舊名臣奕世居然保縉紳五福備身冝爾夀一經教子異他人蛟螭贔屭碑文古松柏隂森墓道新彈指浮雲今古事幾家荒草卧麒麟宋髙宗御題李唐畫唐香山九老二律詩兩疏誰是見機還終始君臣似此難宸翰昭回雲漢上衣冠倣佛畫圖間當時諸老琴尊會盡是同朝鴛鷺班風采拜辭雲陛下白雲千載在香山中秋望月甲辰年賦月裏分眀見九州浮雲西北是璚樓歌鐘未厭今宵酒砧杵那禁此夜愁若使有情須痛哭不知何物是風流霓裳不向當時罷戎馬中原未肯休學舟為崔檢校賦髯崔家寓市河頭齋館臨河題學舟不為乘桴浮大海應期擊楫逝中流風波浮世何能濟駟馬髙車更有憂何事外郎居騎省却將魂夢記滄洲題燕山萬里圖為江左葛元毳編修子賦翰林藁葬古幽州萬里遊魂土一丘父子有情終自苦丹青得趣豈知愁風沙日日黃龍塞雨雪年年青海頭狐死首丘誰不念莫將遺憾在遐陬送單尚書致仕還鄉風塵澒洞識龍顔便解兵符拜諌間天上已扶真主出榻前尚乞故鄉還黃金優老車增重紫禁朝天夢可間世受淮田知所賜幾人得似單家山題國清寺三隱堂豐干寒山拾得莫與間人説舊遊這些風采儘風流只因當日機曽露直到而今笑未休虎迹已無深院閉藤花猶蓋兩巗幽相逢總是知音者莫叫蒼天惱趙州眀巖寺疊嶂重巖出半天芙蓉幽洞下相連浮雲富貴二三子放浪人天五百年飯後風松為伴侣春來花鳥作因緣村堂野墅俱題遍句句天機合自然寒巖寺寒山隱身處一片浮雲去不還龍吟虎嘯出人間豐干往日成饒舌太守當時亦厚顔秋至候蟲還唧唧春來鳴鳥自關關煙蘿古洞依然在要問寒山即此山送郭子程湖州收父骨還廬陵事親盡禮誰非孝豈願遭逢世道艱千里風塵音問隔十年父子夢魂間首丘自負終天痛函骨寧期此日還地下老翁應自慰免將遺憾在他山同謝别駕過澱山湖登普光寺閣次壁間馬郎中詩韻浮雲終日作輕隂寺下龍潭百丈深古刻尚存邢女記好詩今與謝公吟風行澱水搖深碧雨過松花落細金怕見南湖春草色每來髙閣倦登臨陪月中丞訪寶林寺别峰尊師有詩因次其韻傳呼載道不知遙驄馬乘秋氣益驕佛運已知當末劫寺碑猶及見前朝升堂鐘鼓聞三界聽法魚龍趂兩朝不有斯文為世重東坡何以慕參寥客至潦倒無能因不才樂然笑口有時開呼猿洞邉采藥到浴鵠灣頭載酒回對客且容談玉麈題詩何必寄銀臺甕中聽取春漿熟便買鱸魚煮四腮題東臯隱居為范思賢賦海水桑田幾變遷桃花依舊郡城邉蔬園百畝充官稅藥價一生供酒錢詩句興來題綵筆道心悟後付朱絃院曹誰信同僚後談笑交遊十五年留題天台香積寺為鄉僧印秋海賦花界追尋一榻涼破除煩惱是禪房慢揮大扇消長日共倒深杯説故鄉萬事到頭成畫虎百年束手共亡羊眀朝馬首勞瞻望此别人間更渺茫歸來堂詩為雲間青龍鎮章吉甫太守題時年七旬使君致仕歸來日九十慈親猶在堂秋水鱸魚朝入饌薰風紈扇晚生涼孝亷早已稱髙士名德今冝重一鄉花底板輿喧笑語白鬚風動綵衣裳送雋侍者還永樂寺闡大猷尊師記乘官舫過眀州永樂寺中曽一遊繞徑涼雲修竹曉滿池香露小荷秋松花酒貯山瓶送雀舌茶煩蒻籠收爾雋到家煩問詢舊題還刻在詩樓黃岡寺贈朱質夫貢尚書門生尚書賔客唯豫在門下諸生獨爾存終有黃鍾求賈鐸肯於清廟少犧尊茶瓜留客岡頭寺風雨題詩海上村莫問幾時回馬首也須迎候出衡門環隱有序龍翔宫實宋理宗潛邸有十齋環隱其一也後賜為道觀髙士毛起宗居環隱就以自號瞻仰畫像賦詩一首大化循環不可窮至哉樞始得環中漆園化蝶有今日柱史猶龍非此翁齋館前朝存舊制丹青遺像仰髙風百年文獻凋零盡川上空嗟逝水東夢梅花處帳底梅花覺有香不由鐡石作肝腸宫妝何處紅綃女春色誰家白玉堂枕上翠禽棲正穩夢中蝴蝶引初長城樓畫角復吹覺任有文章惱宋郎看劍亭為曹將軍賦此劍名家已數傳為曽與國淨風煙聞雞起舞非今日對酒間看憶往年三尺神光遺電影一函寶氣閟星躔章江曰夜東流去亭下題詩重惘然紙被間眠受用剡藤香不比行雲惱宋郎月裏楊花終夜落雲中蝴蝶過春狂象牀繡枕知難稱道館僧房或可當還是夢中風景别東華塵土久相忘贈醫士潘氏中和齋心天一氣貫中和孺子膏肓若我何內景金花今證道上池玉液不生波獻方龍每乘雲至收杏人曽倩虎馱十世醫傳方胍妙門前無奈杏花多寄謝伯昭伯理二昆仲話别南堂二十年江湖魚雁兩茫然車書此日同天下濠泗而今是日邉架上遺書冝教子老來樂事是歸田謝家子姪應相念每到池塘憶惠連過林和靖墓西湖處士林和靖兩句梅詩直到今此事豈容同末俗當時還亦有知音髙車大斾知何往剩水殘山尚可吟三尺孤墳埋宿莽過君誰不願抽簪尚絅齋為洞霄郎可道賦衣錦能懷尚絅心暗然師道重山林玉因韞櫝知無價琴到希聲是大音蝶化夢魂髙枕後鶴鳴秋水萬山深青苔黃葉空巖畔俗駕何由得一尋瓊花幾枝雪艷向風斜未許吹香上鬢鴉誰取根來廣陵郡却留春在后皇家懿公滅衛雖云鶴煬帝亡隋豈獨花自是錦帆迷故國恨連芳草滿天涯寄題清暉樓謝公履迹遍巖扉似覺髙情與世違昔日文章歸麗句至今山水發清暉神仙滅迹虛金露塵俗何緣别翠微尚憶詠詩同水部山林有待薜蘿衣寄梁太醫髯翁邂逅海西邉風采何曽異往年談客過門從取醉貧家問疾不論錢送方龍每乘雲去種杏人曽見虎眠此等希竒何足怪古來醫術盡通仙移居夀安里二仙卷移居所籍應官期奈此黃梅五月時牆竹翻風搖鳯翥堂萱卧雨帶羅披夏隂正盛衣還濕日晷無移事可知此景自憐張仲蔚蓬蒿三徑共棲遲王敬仲知府自臨江回九鼎勳勞一羽輕幾何嵗月俟河清盧生覺後惟空枕丁令歸來秪故城宛馬老懷沙苑闊賔鴻春憶塞雲平天恩既許投間後莫向除書問姓名次韻鄞孟文經歷留别詩總是邯鄲夢裏身區區鞍馬九衢塵賢才俱進惟新命幕府從交舊日人天上星辰光覺近寒巗松柏色還新從來氣候關時事鴻雁來賔已過春幕府深居得所親好看車馬動行塵身歸絳縣將遺老詩忝河梁别故人行李往來誰不舊疏林折贈意能新都城路有襄陵使欲托微波寄洛神夢梅花處丹青庭院欲黃昏蝴蝶遽遽化夢魂姑射肌膚如處子兒家消息在重門香薰繡被過殘臘影落畫闌連大尊可是玉川無覔處窗前春色勝張琨秋水軒鏡水當軒景最新翔鷗棲鷺總比鄰風驚幃箔螢流扇露濕闌干月近人深院暑收聞搗練前溪波小見埀綸莫言蕭瑟秋光裏還見文章賦楚臣次韻慈利縣王孝亷過洞庭思親之作洞庭波浪接青天渺渺帆檣上計船萬里客程何日盡一宵江月向人圓橋題駟馬名先至風遇鴻毛勢沛然之子澧蘭歌最好有人雲夢澤南邉奉天門早朝次韻千官趣謁武樓間盡是洪鐘帝鑄顔咫尺天威臨御座太平風景出朝班握蘭鳯閣舍人貴視草鸞坡學士間騎馬共談雙闕下期將萬夀祝南山次韻偶成雜然異味出賔盤老覺樽前更有歡清夜可人歌板倦小樓細雨燭花寒狂情肯為諸公吝酒量方知到處寬醉後玉山從倒却試將時果擲潘安程家兄弟合情親霽月光風滿座生樂事笙簫相間發酒懷江海欲同傾自憐緑髮朱顔改尚覺千金一笑輕夜半酒醒孤枕上不將歸思憶江城梅鶴軒梅福髙軒得所親皎然潔白離風塵九臯唳徹雲間鶴萬玉香先天下春門外自應回俗駕尊前猶得伴吟身緑隂窗户研朱者莫是青溪點易人讀府教授徐大章為岐陽王客白以中賦西塘八景詠夜卧有懷不寐若使蔡雍今日讀應題八字刻西塘大音如奏古琴瑟衆羽不瞻孤鳯凰百世可傳惟述作一辭難措是文章老夫為此喜無寐卧誦不知秋夜長壬戌朔旦試筆斯文天與樂餘年中有黃金取酒錢絳老又添新甲子王家惟守舊青氊將春梅蕊茱萸小透雪萱芽翡翠鮮賔客到門無别話履端相慶畫堂前題梧桐宫六逸堂龍化青林水滿溪昔人曽此寄幽棲髙情不負杯中物爛醉何妨日似泥富貴到頭蕉下鹿光隂過眼甕中雞當時不盡風流興付與山鶯儘意啼題夢焦軒道人內視已超然一息薰香遍大千駭鹿始知身似夢覆蕉曽悟佛中禪袈裟萬朵天花裏世界千重梵網邉重見毗那峰頂上手開樓閣説因緣姑蘇懷古十里河堤踏暖塵老懷忽憶故鄉春泥金孔雀裁歌扇刻玉麒麟壓舞裀翠袖錦箏邀上客畫船銀燭照歸人而今白髮東風裏疑是前身與後身題諸葛孔眀身為中山漢子孫西南别立舊乾坤君才十倍曹丕上位列三台蜀相尊布陳有圖靈尚在出師遺表恨猶存休將巾幗羞司馬五丈原頭日已昏題嚴子陵赤圖神運復炎劉白水真人憶舊遊一代位尊眠鳳榻千年名重著羊裘山林孰謂無伊尹廊廟何曽棄許由惟有富春山下月清光常繞石灘流題張天爵父通守公張侯之墓平生好友念張侯紫峽雲深墓木稠赤紱既能承世澤黃金奚用為孫謀衣冠南郡成前輩風月西湖總舊遊過此豈勝存沒感解鞍一奠古墳頭附録伏承員外先生奉楊公之命函香補陀洛伽山瑞相示現使節今還輒成長律四章少寓餞忱南陽乃賢上瀛洲東望海茫茫紫竹林中殿閣涼夜半潮來紅日上巖頭雨過白花香褰裳珮玦聨珠網束髻冠纓湧寶光大士神通天廣博盡將願力固封疆江左長城有鐡星赤心憂國禱滄溟經翻海藏函猶濕兵洗天河刃不腥屢出賜金分將帥終圖全璧奉朝廷幕中司馬才無敵執筆磨崖早勒銘北史楊津鎮定州威望赫然軍中謡曰不怕利堅城但怕楊公鐡星天上張公玉雪妍競傳官府有神仙功名早建平南策詩句今隨過海船夜汲澄潭瓶貯月曉登磐石珮凌煙知君喜得禎祥兆一目髙懸古樹邉宋史彌逺禱海上見一目挂樹邉復果拜相狎鷗亭上望吳山春水無邉壓畫闌一樹飛花羅幕靜滿湖眀月玉簫寒往時京國交遊舊今日江城執馭難後夜西湖鴻雁過好將書信寄平安楊維禎次韻楊左丞五府壁詩皇元正朔承千載天下車書共一家一柱東南擎日月五城西北護煙霞寶刀雷煥蒼精傑天馬郭家獅子花收拾全吳還聖主將軍須用李輕車席帽山人王逢見貽詩畫省委蛇退食遲倒衣相見即相知風流不減張京兆心迹無慚柳士師枕上燕鶯鳴曙日道傍花柳罥遊絲天機人事都觀遍有約山中賸采芝可間老人集卷四
