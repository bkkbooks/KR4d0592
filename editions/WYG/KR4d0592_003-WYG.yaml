body:
  text: 可閒老人集巻三眀張昱撰七言律詩投贈潞國公承㫖學士張仲舉漢家舊徳有桓榮赤舄登朝羽翼成三晉鳯鳴千載會兩河龍現五雲迎獨於社稷多難日復使君臣大義眀自念昔曽親几杖頌聲慚後魯諸生投上中書右丞相托克托履舄従容自九重相王忠孝更誰同千年帶礪猶初誓萬國臣鄰盡下風星貫紫垣朝佩劍月臨黄道夜傳弓漢家若論安劉策四皓難書第一功五府驛代楊左丞留題後有楊維禎次韻免胄日趨丞相府觧鞍夜宿五侯家玉盃行酒聽春雨銀燭照人如晚霞受命敢忘軍旅事撫時又過掖垣花漢家未可輕韓信尚要生擒李左車束髪従戎十五年戰回平地血成川英雄生世有如此忠孝報君當慨然俶擾弄兵俱赤子中興有道自皇天猖狂暫假姑蘓息繫頸終須拜馬前湖山堂宴贈天使還京畫旗風裏繡筵開竟日歌鐘樂未回柳拂玉鞍秋繫馬酒淹羅袖醉傳杯杭城近自月前復使者適従天上來歸對大廷真得實眼中諸將盡竒才岳鄂王墳上作朔雪炎風共此年中原父老亦堪憐䜿儒屢遣祈求使大將空持殺伐權忠誼有碑書大節奸邪無面見重泉至今宰木猶南拱遺憾西陵是墓田陪宴相府得芍藥花有賦醉吐車茵愧不才馬前蝴蝶趂花回玉瓶盛露扶春起錦帳圍燈照夜開埀白敢思溱洧贈欹紅還是廟廊栽揚州何遜空才思惟對髙寒詠閣梅退居湖上投贈楊左丞四首樓外湖光白𣺌茫樓中少婦試新妝行年將近半百嵗大醉豈能千萬塲織錦繡裙飛蛺蝶白描歌扇睡鴛鴦埀楊滿院無人到芍藥花開日正長信馬蘓公堤上行水邉鷗鷺不曽驚春波滿眼湖光細花片飛來雨㸃輕天上碧雲如有詠樓中紅袖謾多情牧之老去狂心歇縂把風流付後生宿酒猶多睡未忺好風何處散香匳可教春日閒瑶瑟而使楊花撲繡簾削跡不煩三顧重息機將廢六壬占今朝畫省無公事又得従容少避嫌且觀神女為行雨莫問郎官應列星芳草到門無俗駕好山終日在湖亭白鷗共戯荷葉小黄鳥亂啼楊柳青肯信曲䦨干外立晚凉吹得酒初醒宴犒將士酒酣命健兒舞劍為樂浙省平章泣下不禁感事有賦平陸龍蛇起殺機旄頭又自照金㣲兩階干羽知何似二典君臣豈盡非劍舞樽前廻夜電燭眀帳下接晨輝可憐司馬江州淚濕盡團花舊戰衣陪宴後堂觀牡丹回有作風光偏惱掖垣人銀甕連車載酒頻寒食新烟萬家樹洛陽花擅一年春㨂好任從天女散近前不嫌丞相嗔壓帽紅香歸路晚㡬多瞻望馬前塵至普陀洛伽山寺作佛事七晝夜祈見海岸觀世音及善財巖七日之間随心應現大衆瞻仰無不慶讃丞相函香致此誠願深海水救羣生慈悲謂可消諸惡征伐容將息大兵金色圓光開寳髻玉毫妙相絡珠瓔手中示現楊枝露願洗干戈作太平戊戌題海上作華表仙人舊姓丁羽毛今日惜飄零海中又見蓬萊淺門外空傳楊柳青暮雨朝雲翻覆手落花飛絮短長亭如何未熟黄粱飯説道英雄夢已醒楊忠愍公墓上作夢覺邯鄲萬有空邦人猶自説英雄道家論將忌三世臣子報君惟一忠淺土何堪封馬鬛迷魂猶自恨秋風死綏固是將軍事國史旂常畫雋功惆悵交游蚤嵗在幽燕費用黄金買少年闕下朝回瞻馬首酒間俊發抱龍泉劇談寜顧日西落倒載不知天左旋惆悵近來纔解事先生五柳種門前三山夢㫁綵雲空㡬把長牋賦惱公畫閣小杯鸚鵡緑玉盤纎手荔枝紅春衫汗裛薔􅅔露夜帳香回茉莉風惆悵近來江海上却將鞍馬學従戎畫船湖上載春行日日花香扇底生蘓小樓前看洗馬水仙祠畔坐聞鶯碧桃紅杏渾相識紫燕黄蜂俱有情惆悵繁華成逝水盡歸江海作潮聲惆悵當年使酒來娼樓紅粉夜相催可憐眀月二分在不見瓊花半朶開誰復醉翁堂下柳更堪從事閣中梅揚州一片青青草誰信春來無雁回惆悵雄藩海上游武昌佳氣接神州東風歸思王孫草北渚愁生帝子洲楚國江山真可惜劉家豚犬亦何羞不須更問中原事官柳新栽過㦸樓至今惆悵在東城結伴看花取次行輦道駐車招飲妓宫牆回馬聽流鶯星河織女従離别海水蓬萊見淺清不有酒船三萬斛此生懐抱向誰傾過楊忠愍公軍府留題縂是田家門下客誰於軍府若為情林花滿樹鶯都散雨水平池草自生街上相逢驚故吏馬前迎拜泣殘兵能言樓上題詩處猶有將軍舊姓名睡覺滿院楊花風力輕牡丹時節好晴眀簾埀不知白日晚睡覺忽聞黄鳥鳴萬斛春光金盞酒百年心事玉人箏劉伶未到忘形處枉自閒將畚鍤行湖亭納凉奈爾湖光月色何不知此境為誰多忽驚墜露翻荷葉想見㣲風生水波炎景只消清夜飲老懐都付小鬟歌家中未必凉如此且待樓西轉絳河燈前有賦雨夜湖樓錦帳埀有人為爾故眠遅春衫照影看歌舞寳合薫烟學畫眉何處絶纓憐楚客為誰掩袂泣樊姬思量暗室無窮事留到天眀不忍欺湖舫勸曹徳昭僉院酒倩得名姬唱慢歌梁塵直欲下輕波西風八月芰荷老落日滿湖鳬雁多到手莫辭雙盞飲轉頭又是一年過光隂只在槐柯上奈此浮生樂事何宿中書左司呈上太尉丞相天上誰開白玉堂東垣列宿共輝光畫屏雪映蓬山雀錦帳雲凝漢署香嚴尹世交憐杜老揚州詩興屬何郎連雲騎省乘風露月過秋河夜色凉别春次揚州成廷珪韻燕語鶯啼盡可哀更無馬跡到青苔自從玉樹成歌後曽見銅仙下淚來為晉為秦花㡬度行雲行雨日千廻若教蝴蝶知春夢儘把黄金付酒盃省垣梅花官梅過臘花開遍何遜楊州興未䦨疎映粉闈疑是畫香飄羅袖欲生寒公餘不厭廵檐􅀏夜後還思把酒看只恐眀朝零落盡枉教人恨角聲殘安慶南城寄賀守帥余廷心郡守韓公懋余家留是郡故句中及之壯哉淮邑冠荆舒新築堅城鐡不如完美皆吾大夫力奠安與爾庶民居歸心江漢朝宗水滯跡周南太史書莫説髩毛成種種近來吾亦愛吾廬丞相委入姑蘓索各官俸米留别幕府諸公不比常年載酒遊杏花時節出杭州粉闈未覺為郎貴萱草難忘此日憂沙漠帛書空見雁江湖春水莫容鷗何時折盡埀楊柳留取他年繫别愁至姑蘓呈太尉相君求米若求雨員外得船如得仙職忝下僚班可耻情通鄰好亦堪憐山中棋局迷樵客溪上桃花誤釣船醉把玊盃無所計不勝惆悵晚春前城南武威樓成守帥余廷心自安慶使人索詩自來名將出名儒暫駐襜帷向上居城繞朱䦨連百雉門排畫㦸壯羣烏雲開五老招何及秋對五峰清有餘樓上記成鐫琬琰廬陵須得蔡襄書辭荅張太尉見招中年頓覺壯心去渉世頗知前事非若使范增能少用肯教劉表失相依風雲天上渾無定麟鳯人間不受鞿殘夢己随舟楫逺五湖春水一鷗飛秋興一夜凉風便覺秋楚人多感易生愁金盤露水何曽見紈扇恩情未肯休零落梧桐金井上稀疎楊柳御街頭近來收得麻姑信説道蓬萊更可憂夜登天童寺觀海日登臨何事獨關情北斗闌干對面横漢使猶空河畔影霓裳如在月中聲魚龍水濶星辰動鴻雁風髙鈴鐸鳴不待下方雞唱罷衲僧東指海雲平桃花園招烏雅亷訪使飲桃花好是未全開人世花開醉㡬回一片嬌随歌扇去滿園紅待使君來尊罍有興皆清事風雨眀朝又緑苔誰見朔兒千嵗實銜巾青鳥莫相猜武夷山南郡名山說武夷幔亭尚想是秦時空中簫管何曽絶洞裏曽孫自不知石室尚遺仙蜕骨棹歌猶唱宋人辭山前毛竹如龍籜笑與壺公作杖騎冷泉亭觀猿舊従巫峽看猿挂此日山中復見之黠與樵蘓爭堕果㨗於風雨下髙枝月沉夜澗魂先㫁風攪霜空叫轉悲應記徃年梅嶺事玊環付與老僧持觀潮次貝廷琚韻世代銷沉在此聲㡬回東下復西傾翻騰日月迷朝夕簸蕩魚龍定死生銜石毎憐精衛小投醪未見濁河清眼前波浪猶如此莫説蓬山頂上行題後堂壁兵權去手志何伸恥是随班入省頻京國蹉跎空在夢蓬萊清淺已生塵繞朝謾贈秦人策孔子將書魯國麟散騎得辭丞相後五湖安徃不閒人春閨詞白日髙堂欲暮難鳴鳩乳燕靜相干銀瓶行酒雙鬟緑玊管調笙十指寒蝴蝶毎因飛處見牡丹多是折來看眀朝為遣安西使錦字紅燈織夜䦨春懐㡬涴先生漉酒巾眼中猶是落花頻春來祗與醉為伴睡起翻疑夢是真翠羽棲香秦隴鳥玊釵墜髩洛陽人風光已逐流年去此事那容更問津湖上謾興百鎰黄金一􅀏輕少年買得是狂名樽中酒釀湖波緑席上人歌鳯語清蛺蝶畫羅宫様扇珊瑚小柱教坊箏南朝舊俗憐輕薄毎到花時别有情爛漫風光在酒家狂蜂冶蝶趂繁華人來人徃如趨市樓上樓前盡屬花波面畫船雙蕩槳堤邉黄犢小游車目成眉語知何限消盡柔魂在狹斜湖上新泥雪漸融門前溝水暗相通裙欺萱草輕盈緑粉學櫻桃淺淡紅暮雨欲來銀燭上春寒猶在酒樽空青綾被薄不成夢又是一畨花信風樂事杭州奈爾何人間富貴易消磨畫船湖水年年在紅粉娼樓處處多歌引行雲來綺席舞翻廻雪下春波東坡徃日留詩後更有何人載酒過聞鶯風花時節又清眀迸淚何縁聽曉鶯咫尺故鄉天近逺㡬家春草路縦横英雄轉眼俱為鬼造物於人豈絶情自是晚生堯舜世不關天地不昇平同趙郎竹園夜飲塵土無由得見侵粉牆髙䕶碧雲深日行南陸暑不到月度天河龍自吟沉飲何妨同阮籍幽情亦或過山隂夜凉庭院羅衣薄吹徹參差思不禁游雲門寺同寳林别峰尊師賦東游好是雲門寺况在若耶溪水邉茶會詩𫝊唐舊刻松壇名重晉諸賢行雲欲傍支郎馬埀柳能維賀老船也當一塲風月夢為題名姓法堂前凝香閣聽雪陡然寒重紫貂輕便覺髙檐瓦有聲欹枕欲同蟬殻蜕開門唯恐鶴巢傾數杯酒力春容轉滿盞茶香夜思清小玊近牀推不醒袖籠檀板失天眀桐栢宫留題甚慕天台馬子㣲後千年始到幽棲江湖嵗月憐新夢泉石烟霞感舊題阿母信𫝊青鳥後玊笙人逺絳河低當時不盡風流興付與山鶯盡日啼繡毬花次烏雅亷使韻繡毬春晚欲生寒滿樹玲瓏雪未乾落遍楊花渾不覺飛來蝴蝶忽成團釵頭懶帶應嫌重手裏閒抛却好看天女夜凉乗月到羽輪偷駐碧䦨干竹居為張行中題南渡循王之子孫文采風流今獨存既有緑筠為别業何須畫㦸在髙門小堂翡翠横釵影曲徑莓苔散屐痕侍婢牽蘿相補葺㡬回風雨送黄昬菊隱齋為金子才賦蒔菊家園作隱淪要於晚節伴閒身従來東晉多名士豈獨南陽有老人色綻黄華知應候香浮緑酒可過旬蘓耽橘井桐君籙従古良醫盡逸民初月薄暮蛾眉臨水出照人猶自未分眀初升逺岫如無意欲下西樓却有情離别㡬多長在望團圓三五未能成豈知少婦堦前拜羅䄂纔揎恨己盈湖樓樓前芳樹碧盈盈付與幽禽自在鳴堤上馬䭾紅粉過湖中人載畫船行日長燕子語偏好風暖楊花體更輕何限才情被花惱獨教書記得狂名碧梧軒為賈彦仁彦徳二貢士賦賈家種玊能成樹上有結巢雙鳯凰隂連深井暮雲碧花落大樽春酒香孔雀羽毛歌扇小石榴顔色舞裙長莫教擊墜軒前緑留與吹笙共晚凉東堂梨花為爾東堂雪滿株花時長是憶吾廬風前恐化莊周蝶月下還迷衛玠車老至逢春成感慨興來把酒為躊躇尋常一様清眀節説似當年總不如問月亭何事流年逐逝波試將此意問姮娥到頭白髪㡬人在愛此清光今夜多直欲仰空援北斗便須儘量酌天河此懐此處不傾倒禁得宋郎秋思何題清心堂詩巻後為相院判賦曽把桐鄉作故鄉衙回繫馬入斯堂竇家五子榮丹桂謝氏諸郎焚紫囊乞得異花曽見種釀成名酒許先嘗潜然掩巻埀殘涙不獨題詩媿老蒼贈謝肅東還風塵如此送君行莫惜離觴與再傾執手且聽楊柳曲過江便是越州城龍駒堕地即千里鳳鳥及時纔一鳴年少有才終大用賈生曽擅洛陽名春暉堂為謝肅題謝傅風流在越鄉至今文彩見諸郎百年喬木慈烏聚㡬日東風萱草長江上鯉魚朝入饌枕前紈扇晚生凉詩成便欲煩青鳥銜致君家白玉堂次林叔大都事韻春來長是誤佳期鴆鳥雄鳴不可私錯認櫻桃懸蟢子悔將衫䄂染鵝兒燒殘蠟燭渾成涙折㫁蓮莖却是絲辜負緑窓閒嵗月只教楊柳妬腰肢何處銀鞍白鼻騧忘將錦瑟數年華渡頭水急憐桃業陌上春狂信柳花那得芳心對鸚鵡泣將殘涙付琵琶一身已自成惆悵况是平陽十萬家莫謾題情在粉牆藕絲終日繫柔膓不知漢主黄金屋何似盧家白玉堂好夢自抛桃葉後閒愁似過柳條長無端收得畨羅帕徹夜薔薇露水香陳王當日賦凌波寫得風流也太多掌上玉鸞看教舞雲中青鳥使傳歌情緘尺素魚中字恨織廻文錦上梭休信雙星是牛女年年波浪隔天河白菊雪羽毿然欲滿叢秋香吹遍畫闌東今宵白露今宵月昨夜清霜昨夜風朝灌尚於青蕊見夕餐將與素霞同數莖白髪閒相對誰識柴桑畤苧翁驚秋城上髙風散鼓鼙樓頭獨客不勝悲老嬰世故嗟流落病念鄉關厭别離仰面絳霄猶昨日驚心黄葉又當時所悲騎省空名累不是潘郎愛賦詩昔游春到名園総是花都城無處不繁華冠翹鶡尾朱袍盛馬頓金羈玉面斜騎吏去忙官索酒侯門散晚妓留車党家賤妾粗豪慣輕易銀瓶雪水茶小王孫貂帽貂裘美少年圓牌通籍内門前新分草地縁游獵舊賜彤弓未控弦銀甕蒲萄春共載玉鞍驕馬日随牽穹廬一夜迷深雪忘却朝天是醉眠漢未央宫榱題硯雕牆峻宇㡬浮雲金石雖堅亦鮮存秦宫三月已灰燼漢瓦千年猶𨽻文改用尚能為硯器得名何異在君門咸陽土盡英雄骨誰是榱題記主恩匏𤓰道人為徐子貞賦吾豈匏𤓰繫此生道人玩世以為名百年雨露司榮悴一日江湖見老成濩落情懐莊子瓠浮沉踪跡楚王萍壺公借與龍為杖􅂸着青鞋到處行秋聲自従大火西流後漸覺凉風到竹林李白已無當世志宋郎又動少年心羣隂得勢夜聲合萬物將窮殺氣沉謾索雅琴彈一曲徽絃繞指是商音七夕天上何因有别離人間謾自指佳期果如女嫁男婚事何限風清月白時銀漢㡬曽横鵲影花盤空復罥蛛絲今朝少婦心中事只有廻文錦字知寄淮安夏掖齋為感風花懶出門每於時事鮮知聞江湖信逺春空雁僚佐情深日暮雲詩句好於何水部官資髙過杜司勲海波不隔淮揚路遥指蓬萊憶使君有餘清堂連雲騎省與之鄰可是髙堂履舄頻湖水過雲天似玉山風吹酒月留人紅綃貼肉扶歌板翠羽妝頭出舞茵禮法豈為吾軰設直須樂死百年身柬示二姪女連宵骨肉夢相牽二女洪都有信傳聞説長成渾屋喜寄來針線得人憐阿婆近日身差健老嬸經年病未痊爾叔治兵淮水上使回懐抱覺凄然寄内臺侍御史韓克莊雜花猶記雨諸天共禮㫋檀古佛前塔院施僧猶昨日齋房聽雨憶當年抄書不許支官紙買酒従教用俸錢老盡尚書舊賔客至今慚愧杜樊川夜泊牛渚磯同韓克莊僉事李五峰先軰登蛾眉亭牛渚磯頭青雀舫蛾眉亭上紫鸞笙月中只可賦秋興酒後不冝留歩兵萬里長河何處盡百年遺恨此中生水波総是英雄涙剗却青山氣未平浙省感恩榮言懐述事仰拜宣黄萃一門更煩使者枉南轅寵榮已過愚民分存没俱蒙聖主恩列爵稱男分五等封君有縣亦通尊區區戎馬驅馳後日月餘光照覆盆眀皇妃子擊丸圖畫柱相當馳道開黄旗風裡試龍媒天廻日馭戎衣起電繞星樞綵棒催供奉嬪嬙皆令色近前便佞是于思九齡猶是開元日何事都無諌疏來重過育王寺眀月堂同照大千尊師賦又擕二客過斯堂慚愧當年塔院香染習未除塵土念奔馳猶作馬牛忙漸添白髪頭顱上轉覺青雲道路長儘醉堂前舊時月莫將閒話及齊梁贈士人軍中售筆古來文字用鉛槧筆至蒙恬始得名每日諸軍傳檄到何人横槊賦詩成管裁鳴鳳巢邉節毫運饑蚕葉上聲莫鄙毛錐無所用要知韓范盡書生亷都事海道失風自丹羅至浙右還閩省指南針下失風㠶雪浪連天不見山惟爾不懐和氏璧彼蒼竟賜大夫環皇天未厭生戎馬國歩何能㫁阻難此去驛程三百里海棠花底度閩關侍御周伯溫以行臺羈留姑蘓柬寄之白頭嵗月付流波何物虚名在諌坡屬國莫嫌持節乆子陽猶謂見天多强梁不見圖銷印䟦扈如聞欲倒戈一樹紅梨春事晚宣文閣下欲如何殘牡丹繞䦨莫惜酒行頻開到姚黄已暮春瓊樹今朝歌正好彩雲昨夜夢非真園林雖不異前日車馬可憐非舊人欲倩東風問蝴蝶花前誰是百年身贈吳世顯宣使代張氏捧謝表請命朝廷寄仲舉此去風波萬里長使人指日覲清光雲開雉尾當霄漢龍抱金函出表章羌服従來尊正朔包茅次第貢眀堂浯溪有石髙千丈謾叟重煩頌大唐題御史孟昉野服畫像好似當年賀季真乞身歸老鏡湖春銅章不綰御史印練布能裁處士衣麟閣雲臺千載後鳥啼花落㡬回新浮雲過眼尋常事且作齊東一野人王自牧冷起敬諸文士遊西湖南山記題其後近聞甚得湖山樂惜不與之同一遊莫問石城來艇子却思簫管在揚州枕邉蝴蝶髙樓夢扇底芙蓉小院秋今覺司勲非徃日酒間無復舊風流得朱垣編修海道之音命酒徴歌記徃年玉堂遂有夢相牽魚緘尺素雖云宻事載空言始可憐季世人材思管樂盛時戎馬説幽燕張騫慣識天河路俯仰乾坤一慨然髙房山畫廬山圖貢雲林待制有詩在上為其子户部尚書貢師泰賦盖其家物也萬壑匡廬紙滿張好詩好畫兩相當十年物色偶然得二老風流何可忘還見虹光生靜夜却驚雲氣濕髙堂尚書座上多逰客獨有張翰憶故鄉謝左丞自軍中至同宴周徳新員外别業坐來清聽滿風前頓覺煩襟為灑然馬上功名真是夢杯中嵗月莫非仙浮雲對嶺張圖畫鳴鳥藏花雜管絃莫訝周郎賔客盛雄資英發正當年兩山亭留題馬頭曽為使君回北望新亭道路開於越地形縁海盡勾吳山色過江來英雄有恨餘湖水天地忘懐入酒杯珎重謝家林下客玉山何待倩人催三月三日湖上作此日誰人肯在家傾城滿意事繁華時非上已不為節春到牡丹纔是花霧髩風鬟湖上女畫輪繡轂道傍車兒童儘唱銅鞮曲未覺人間日易斜此日西湖似曲江湔裙流水碧淙淙誰家婦女不紅粉是處水亭皆緑窓白髪㸔花春可數畫船扶醉玉成雙邦人何哂狂居士老至關情尚未降汴河懐古家國承平厭萬機輕乗黄屋出京畿三年廵狩前王有千里看花亘古稀河畔柳條春自長苑中螢火夜還飛當時九廟躬辭日肯信龍舟更不歸涵虛閣靈巖寺舊為館娃宫靈巖寺是館娃宫霸國風流夢已空楚客智窮三諌後越師戍合五湖中佳人已化朝雲白髙閣猶涵夕照紅誰料後千年過此却憑䦨檻數飛鴻叢玉軒在凈慈寺方丈後有鹽運使李員嶠畫墨竹一林儒學提舉趙松雪題名叢玉參政姚江翁作記憲副鄧善之書版刻在楣間河東使君竹成癖落墨滿林烟雨新雪壁自期留後日碧紗誰與䕶輕塵百年聚散同殘夢一代風流不數人賴是主僧知敬客不辭騎馬到來頻遊天台山回别省院諸公眀時無日不従容三月清遊在醉中晚岫逺當雲際碧野花爭近馬前紅雖非奉使河源上猶及題詩浙水東甚覺淹留煩従者靦顔何以荅諸公送馬編修還眀州當年文采動京城盡説江南馬長卿青史可憐成絶筆白頭相見重關情内湖柳色春仍好小院斜陽晚更眀門外畫船堪載酒玉盃儘向故人傾題張叔芳參謀南澗草堂狂客構堂南澗濵澗中濯足任魚嗔日容二仲共三徑家與萬松為四鄰石角鈎衣歸騎晚花枝妨帽小園春此來不敢歌叢桂知是淮王座上人嵗除日同廖如川至太尉丞相府留坐説周易因賜酒并官厯賦此上謝嵗晚謬為趨府客深慚欵接異他人説經毎笑匡君老賜酒何容畢卓真眀日千官瞻魏闕㡬時萬國共陽春家鄉似覺無歸處難擬酬恩致此身贈太史子𤣥還閩中子𤣥侍其師貢秘卿由海道遂赴京師至浙西秘卿死險阻蛟龍又則那只縁有路接天河少年謾動乗桴興中道俄聞曳杖歌司馬北游空嵗月杜陵歸夢隔山河憑君莫下窮途淚何處深山無薜蘿右丞周伯温出示前為宣文閣授經郎代祀孔子廟次韻萬世斯文有耿光端然龍衮閟宫牆春秋不獨尊周室金石如聞奏廟堂碑樹丹楹皇帝詔盒封黄帕内庭香至今仰賴遺經在師表前王恵後王送徐大章建寜路學教授經籍傳家二百年河汾今在路西偏文雄虎豹豈徒作名動京師非偶然教領七閩勝作郡受知八座合稱賢佇看召入承眀署禮樂遺書在簡編寄我軒為唐主敬貢士賦人世有生皆我寄看來造物亦兒戯身為蝴蝶何關夢飯熟黄粱自有時形影不煩相贈荅死生同是一希夷濁醪到手能成醉此趣陶潜或可知送貢師泰尚書入閩發鹽粮供北軍尚書奉詔趨閩省天子深為餉運憂使者頻來大眀殿親軍猶駐武安州浮烟壓地朝添竈眀月籠沙夜唱籌驛路海棠迎馬首春光難為使君留送杜時中副使南方風土要相宜小盒㯽榔好自随蜑户負魚朝入市囝娘把燭夜題詩三年舊俗猶前日八郡良家異昔時若問蒼生蘓息否使車除是一驅馳夜潮禁得錢塘江上潮惱人偏在可憐宵頭顱如許更能白魂魄㡬何仍欲消濁浪漸髙河影没雄風未盡雪山遥西流力盡還東下月滿空江共寂寥自遣毎每樽前惜嵗華牡丹開後似無花山中謾説秦為晉海上難逢棗似𤓰妄想既空無得夢神仙所至即為家不須更問升沉事看取西樓月又斜秋閨詞一曲哀箏感素秋梧桐落盡碧溪頭御溝葉上誰題怨錦字機中自織愁紈扇恩情空望望鯉魚書信更悠悠雙星不到銀河近風浪遥於隔十洲無題及時無物不倀倀燕語鶯啼縂㫁膓洛浦輕塵憐故歩揚州舊夢惜餘香玉和獺髄寜無藥絃續鸞膠信有方便把漢江都作酒飲時猶恐負春光辨謗詩宣徽院司議李榮貴以使事至眀州飛語獲謗拘留二年乞詩白其事司徒方公命還京師司議因乗海上槎河源歸路未應賖市中徒爾疑成虎杯内何曽影似蛇官事吉凶占鵲語閨房消息卜燈花南風乞得樓船便六月中旬便到家縦飲外湖裏湖花正開風情滿意看花來白銀大甕貯名酒翠羽小姬歌落梅身外功名真土苴古来賢聖盡塵埃韶光如此不一醉百嵗好懐能㡬回松筠軒為湖州沈叔方賦軒居好在松筠裏門外清溪繞屋廬文物曽陪諸老後故家似是百年餘客來與酌茯苓酒月出共看科斗書若見漁郎煩借問桃花清思近何如謝吳起宗寫神紫綬空慚老病身每於時事與經綸不呼賀監為狂客却謂張良如婦人潦倒形容何用似荒唐言語半非真凌烟畫像今誰在更與丹青寫此神送劉庸道侍老父入閩就養此别為生一愴然福州逺在海南邉白頭病叟年八十紅樹寒山路㡬千負米既供為子職賃車不仰故人錢起居莫與㯽榔逺風土他鄉氣候偏棲霞嶺訪姚子章買得湖船為訪君望中都是北山雲風前楊柳驚秋晚波面芰荷愁日曛青史縦能傳後世白頭休更説従軍棲霞有酒能留客縦飲何妨到夜分送張伯雅架閣入閩省聞道連年瘴氣收城中風氣稱清遊叅天榕樹快人意似雪梅花當馬頭海客朝盤送珧柱囝娘春咏冩銀鈎毋嫌習俗閩中利儘勝吳船唱莫愁題貫酸齋蘆花被詩後學士才名半滑稽滄浪歌裏得新知靜思金馬門前直那似蘆花被底時夢與朝雲行處近醉従江月到來遲風流滿紙龍蛇字傳遍梁山是此詩劉生侍貢尚書入閩卒業藉甚劉生尚古文師資貢禹卒前聞従公未覺山程逺到日須知土俗分紅嚼㯽榔霞滿口白飛鸚鵡雪成羣七閩自昔稱文物莫説三山盡瘴雲感事雨過湖樓作晚寒此心時暫酒邉寛杞人惟恐青天墜精衛難期碧海亁鴻雁信従天上過山河影在月中看洛陽橋上聞鵑處誰識當時獨倚闌老至翻遭世慮牽何曽一覺得安眠家鄉尚逺潯陽郡世事猶如天寳年朝服唯瞻遼海上羽書不㫁省門前長星正在天西北白水寒沙盡可憐雨香堂為晦岡李介夫賦雷電冥冥起晦岡百年靈氣會斯堂友人李愿在盤谷髙士嚴陵是故鄉薄有資囊供一老盡將文采付諸郎酒坊新斫松杉架每日風來雨氣香題桃源州知州李尚志母暨陽縣君蔣氏墓誌後承㫖學士榮祿大夫晉寜張翥撰小龍岡上有髙墳石表新題蔣院君五品官榮清代爵一封誥織紫鸞文生兒何愧孫征虜作誌可無揚子雲歸去帛焚人事畢大夫原是舊將軍題原善張府史具慶堂張子構堂題具慶此生捧檄為榮親府中年少固可數幕下英才惟此人尚褧錦衣加吉服忘憂萱草共陽春移忠錫類従茲起何患風雲不要津題推官贈行巻聖主搜賢及海隅王褒歘起應時須澧蘭處處歌公子楚國人人頌大夫藉甚姓名登制命沛然霖雨下雲衢力田孝悌興巖穴何異福王遺畫圖西湖漫興玉局當年為寫真西施宜笑復宜顰朝雲暮雨空前夢桃葉柳枝如故人露電光隂千刼外魚龍波浪一畨新傷心最是林逋宅半畆殘梅共晚春清槩隱居門向東吳好處開柳花風裏白鷗來青山對榻容欹枕黄鳥啼春索舉杯賔客偶擕紅袖至庖厨新得素鱗回滿前清槩誰能領消得曹公八斗才贈仙都生括蒼仙都十二城中有異人毛骨清淩風振佩片霞舉乘月吹笙雙鳯鳴山上羊眠知石化洞中桃熟騐丹成長鑱采藥或能見不識此生真姓名聽雪軒化機潛運本無聲學士情多睡未成隱几欲同蟬殻蜕開門惟恐鶴巢傾花飛翠袖寒光動茶煮銀瓶夜氣清小閣下簾人似玉舞衣製得五銖輕慧具庵自灤京回慧師新自上京回壊色袈裟染刼灰河漢路遥難載石蓬萊水淺不勝杯已知道骨鶴同瘦無復機心鷗可猜去把西江都吸盡却従馬祖問如來仙姑泉次劉郎中韻誰把丹崖手擘開巨靈還向此中來青冥風露銀河近白日雷霆碣石催神女有時成暮雨胡麻何處是天台劉郎舊不通仙籍能得題詩在紫苔浙江省理問朱文選為冀院君求輓詩鏡鸞莫更惜孤鶱白玉臺前已抱孫冀院君今題鳯誥婦人貴已載魚軒何須出涕悲同穴政可長歌為鼓盆夫壻白頭無所憾只求文采賦招魂湖山堂觀牡丹穠香偏惹宦遊人銀甕連車載酒頻乍雨乍晴三月節傾城傾國一年春却勝飛燕為皇后謾把驚鴻比洛神若問風流誰可賦只應宋玉是東鄰和三脚雞士壁上韻河上仙翁有洞房几篷雖小勝舟航徑花妨帽青霞近檻竹侵衣白露香盤内釣魚供過客牀頭剪月照抄方平生養得雞三脚㡬向人間唱曉光素君詩為山隂王思敬賦養素衡門嵗已深坐看喬木㡬成隂青雲不到幽人夢白髪能知閲世心負郭無田遺稚子傳家有集是黄金絳霞盈頰先生醉詠徧堯夫擊壤吟送宋倬還南康及此青春還故鄉順風㡬日到南康峰連五老出空濶水接二孤來𣺌茫徐福樓船能共載劉安雞犬亦相將山桃子落都成樹花裏應迷舊草堂荅仁一初禪師次韻冨春江頭風浪稀冨春山裏薜蘿埀滿前眀月為誰好中有髙僧勞我思意適定同魚躍處神清都在鶴鳴時仰承山偈難酬荅不是張衡嬾賦詩過峽石山張同知墓上作平生好友説張侯紫峽雲深暮木稠朱紱尚能光世澤黄金元不為孫謀衣冠南郡成前軰風月西湖縂舊游過此豈勝存殁感恨無孤劒挂山頭題若水臨周昉畫用虞先生韻一片行雲出畫簷東風吹恨滿眉尖凌波鵠峙塵生歩舞鏡鸞廻月照奩楊柳緑肥羞嬝娜櫻桃紅熟妬香甜風流更有驚人處呼下丹青語未淹贈王法師祈雨感應名銜知乆達天關可是風雷指顧間禹歩祝香纔一息雷聲送雨已千山公私盡有倉箱望壠畆都忘稼穡艱下土不知蒙帝力滿城簫鼓送龍還蘭窓圖為戴掾賦舊家文獻石屏翁楚國髙情世所工捐佩憶曽過澧上浩歌今望在雲中色欺翡翠滋清露香澹薔薇送好風可是郎君玉窓裏肯將幽興出蘭叢謾興浮世浮名一羽輕百年何用校衰榮滿壺好酒供春酌㡬尺遊絲共晚晴眀月半遮盧女扇飛鴻斜引謝家箏揚州杜牧無拘束每到花時最有情送戴檢校入閩叨忝眀時已自分徃還惟是舊斯文西窓夜雨同聽處左掖官曹獨有君茉莉御香騰玉氣荔芰顔色染羅紋風流東閣應多咏肯與幽蘭寄暮雲雙清館蔡參政立名廬陵兩生來作掾虀甕長年氷雪寒中書八座共相許華衮一字誠為難丰神左右映白璧文彩上下翔青鸞况聞客館更清爽秋色南山相對看送湯僉書還京天上城開白玉京仙曹列職侍金庭行人半是従龍氣載筆都憑躡鳯翎鳷鵲西飛雲𣺌𣺌蓬萊東望海冥冥道家自古無離别唯誦空歌送使星園隱為方員外賦省郎别業苕溪上抱甕日遊溪水邉花徑春晴蝴蝶到菜畦雨過桔橰懸兒童慣識題詩客鷗鳥常随載酒船更説陳琳工筆札獨將文采従戎旃佑客不用誇雄盖世勲不須考證六經文孰為詩史杜工部誰是𤣥經揚子雲馬上牛頭髙一尺酒邉豪氣壓三軍鹽錢買得娼樓宿鴉鵲鴛鴦醉莫分題前赤壁賦圖黄州故事今何在漢水東流尚未窮一世英雄爭赤壁百年風月属坡翁吹簫俊發龍吟後作賦才豪鶴夢中二客従遊雪堂夜丹青猶與昔時同題曹伯起雲門山房相國傳來㡬世孫山堂随處見雲門侯家畫㦸固無有舊物青氊俱尚存清譽在人瑚璉器髙情終日鳯凰羣芝蘭玉樹階庭秀已是新承雨露恩送布政司周照磨赴京聽除沿檄回京喜可知青雲毋謂著鞭遲供為臣職乃常事簡在帝心惟所司宗廟豈遺瑚璉器羽儀當會鳯凰池仙郎戀闕情應切不為河梁住少時忠養堂為張府掾賦張氏構堂情已著毛生捧檄事方新府中才俊固多士幕下孝亷惟此人返哺老烏憐白首冝男芳草擅青春莫論日用三牲養一面歡顔足奉親筠忩圖為荆南曹以章賦豫章徐文珍畫此君何可一日無徐君為繪筠忩圖深居碧雲憐日暮展巻清風生座隅漆簡舊來銷翡翠漁竿釣罷拂珊瑚荆南不近周王獵晚節猶能宿鳯雛秋水軒為惟真賦鏡湖一曲越城邉溢岸秋波若可憐雪㸃荷塘看鷺下煙銷沙渚見鷗眠賦成騎省従斑髩酒在稽山信畫船何在望洋奔海若軒中自足管流年題大隱菴開士殊無别逺翠樓坐來未覺西山逺紫翠千重隔畫䦨此地豈容擕酒到任誰只許捲簾看佛爐香共朝雲散客椀茶分雪乳寒一自得陪清論後此心不用倩師安醉漁為錢思復賦江湖猶自有狂夫白髪蕭然負壯圖睡著任船随月走醉歸臨水索花扶要知吕望真漁者可惜酈生非酒徒澤畔獨醒誠可詠春風能到雪肌膚次韻處士和壎上人詩每到爐頭憶懶殘十年戎馬雪忩寒亂來亦謂功名易老去纔知世路難醉把茱萸應自感狂題鸚鵡欲誰看相逢白髪秋風裏何惜銀燈照夜闌司馬温公九世孫碏持公自書獨樂園記并東坡詩刻今將二百餘年紙不盈尺手澤猶存感而賦詩浮雲聚散豈堪論富貴何如道徳尊㡬見蓬萊成淺水可堪風雨換髙門紙圖價匪千金重手澤傳能九世存眼見寢園成茂草却知司馬有兒孫留别寳林同别峰講主酒船漫爾到山隂賴有髙僧在寳林不信孤鸞臨寳鏡更無流水入瑶琴閒吟蝴蝶過鄰近醉撃珊瑚坐竹深此去浙江纔百里興來命駕即相尋留題滴翠軒城中買地論黄金種得琅玕欲千尺月臨閒砌白烟生霧入空林翠光滴長房騎杖龍一枝子晉吹笙鳯雙翼曽過門外廻酒船洞庭水深楚山碧贈李學究裒然縫掖更埀紳見客何曽有怒嗔講道誰為木鐸者摛詞真似玉堂人舊書㡬帙俱先集修竹千竿是比鄰每向百花時節到長裾自曵小園春重陽日寄洞霄宫賈道士天官侍郎曽寄音因循秋晚始相尋張良中嵗頗好道賈島一生成苦吟敢學游山随猛虎要聴搗藥試微禽丹泉况説紅如酒好與茱萸一處斟田園居早嵗歸田古所稀豈同蘧瑗晚知非臘醅儘醉鸕鷀杓春服仍如薜荔衣一畆園居皆樂土百年冨貴儘危機沙頭㡬動鱸魚興毎到花時與願違眀州倪師園觀猿㨗於風雨過喬枝乍鎖名園亦自疑㡬萬里來都是恨第三聲後最堪悲月沉夜澗魂先去露滴春梢淚對埀冨貴豈能長汝役緑珠還有堕樓時晚歸左掖歸時日未斜小園檢㸃舊生涯染裙萱草纔抽葉破雪櫻桃又著花玉斝試斟官給酒銀煎重瀹貢餘茶西湖水色春來好説道風光似謝家雪溪船為李勛賦玉山自倒雪溪船何似長安酒肆眠良夜竹聲偏到耳舊時月色不論錢佳兒出見詩能誦好客來頻榻懶懸更有落梅歌小妾儘堪陶冩盡餘年徑山興聖萬嵗禪寺之廣福庵乃曇芳忠公道塲其徒統上人居焉菴前舊有海棠樹洪武三年結實大如木𤓰五色有香常謂海棠春一夢却成因果結天葩有同仙客誇桃實不待詩人賦木𤓰龍頷珠今歸汝手錦衣囊合在誰家眀年燕子來時候更與維摩作散花鄰園海棠自家池館乆荒凉却過鄰園看海棠日色未嫣紅錦被露華猶濕紫羅囊掌中飛燕還能舞夢裏朝雲自有香銀燭莫辭深夜照㡬多佳麗負春光題王維賢東里草堂週遭多是及肩牆馬過猶知舊草堂苔徑雨晴蝴蝶亂藥䦨風暖牡丹香篇詩未覺為時重杯酒能留共日長豈是輞川無作者却同裴廸賦山莊慕雲庵此菴長與此雲期大孝終身有慕之桮棬更無重飲日板輿安有再乘時行天雨絶皆為淚落日烏啼縂是悲誰刻會稽山下石悠悠千載白雲詞題秋江送别圖故人寫出陽關意都付丹青半幅中霄漢正當鳴鳯日帆檣好趂大鵬風酒斟鸚鵡偏能緑花贈芙蓉可奈紅對此題詩無所属百年補報是深衷寄戴山人近水齋房自掩扉若耶溪路客來稀沉浮里閈時將隱俯仰人生事已非小妾謾歌楊柳曲髙年渾稱薜蘿衣誰能冨與封君等千畆湖田紫芋肥醉題二月鶯聲最好聽風光終日在湖亭清宵酒壓楊花夢細雨燈深孔雀屏情在綢繆歌白苧心同慷慨贈青萍方平自得麻姑信従此人間見客星贈朝元宫道士邢本初朝元宫中邢道士神采照人如玉山壺中日月付談笑天上風雲従徃還虎守杏林丹已熟龍眠秋水劔長閒共傳紫氣如車盖徃徃相随出近關觀雪銀燭髙燒錦瑟停酒杯如對六花傾清寒未覺貂裘重小舞偏憐翠袖輕金谷緑珠紛有態鴻門玉斗碎無聲九天散漫随風處莫是天人欬唾成筠深軒幽居只在平湖上萬竹㝠㝠不可尋龍化每因風雨過鳯巢都在碧雲深人皆到此失炎暑風忽過之如瑟琴能有此君相晤對故家何必積黄金晏居有懐徐一䕫教授逝者如斯繼者誰遺經獨抱可深悲心忘爵禄身方逸道載文章老始知乳燕試飛華屋靜桐隂初合畫簾埀古音最愛朱絃瑟彈向髙堂念别離題孝義詩巻可將言行以書紳淮海維揚見若人慷慨分金存乃叔艱難返骨葬其親刺詩杕杜於今廢髙塜麒麟自此新俯仰即今無愧怍平生張掾厚彞倫補賦征雲南掾史凱還詩大侯秉鉞行天討戎幕論兵職匪輕勢若摧枯狂虜滅文無加㸃㨗書成日随赤舄紆髙歩身附青雲致盛名入奏定功應賜爵班超元是魯書生水竹居為諸葛伯安賦諸葛南陽有草廬何如於越此幽居門前修竹畫不就湖上好山青有餘日暮碧雲生悵望天寒翠袖若愁予鯉魚遺我平安信盡向琅玕節下書七夕七夕佳期自古今雙星有爛夜沉沉可憐乞巧樓前月曽照長生殿裏心鵲引凡情瞻繡戸蝶随秋夢入羅衾斜河已没東方白露濕幽蘭思不禁題徐浦墓銘後肯堂處士吾故人常過其家今其子温以戴良墓銘見示愴然有作百年人事漫紛紜覺却南柯夢自分名節不虧惟獨行墓碑無愧是斯文器中瑚璉非虛譽天上麒麟竟失羣髙義有誰如季札願同留劍挂徐墳送都司邵徳章之京師還記樽前㑹徃年又看沿檄上朝天青雲自此而升矣白首何堪為黯然劍佩東華深雨露文章西府盛才賢鳯凰池上應多暇為賦停雲慰老顛張旭也題岳王祠落日西湖土一墟黄泉赤血恨難除開邉衆許儕韓信舉國渾憐䘮子胥廊廟錦文忘版籍京師黔首望鑾輿即今五夜梅花角吹作南來問信書過湖山堂舊基見杏花飲賜黄封未㡬時丹青池舘盡荒基何人富貴可長在自古衰榮更共之樂事恰如春夢覺狂情惟有杏花知醉翁莫説當時醉團扇題詩忘與誰紫薇樓感事太尉當年宴此樓長䋲直欲繫清秋隔欄畫舫是湖水捲幔青山見越州叠鼓夜催諸將舞髙燈春照美人愁大夫司馬今頭白不獨登臨感舊游自貽近年頗覺志倥侗不復行雲入夢中聽曲任教絃有悞賦詩何必句能工豈惟走卒知司馬還有滁人識醉翁樊素小蠻俱未遣㡬曽虛度百花風東林之子青年獨老成布袍寛博稱其名李膺謾自知文舉楊意無能薦長卿每到草堂成酩酊偶過花徑亦逢迎卜鄰自覺頭加白轉信前賢畏後生虎丘寺留題莓苔欲徧盤陀石知是梁朝古道塲陳迹謾驚成俯仰空門元不與興亡白漫天上俱兵氣赤伏池中是劍光如會生公重説法勸教東海莫栽桑送張丞之湯隂試官知在兩河間此别車轅未可攀萬樹秋風古臺路數峰晴雪太行山甕頭黄酒封春色葉底紅梨染醉顔儘觧腰纒供一醉揚州誰見鶴飛還山中夏日禍福無門祗自尋始知眀哲願山林誰能白首儒衣敝吟對黄鸝夏木深賴有故書堪寓目已無官事可嬰心凉風滿扇清樽在只此人生直萬金錄家人語鏡裏霜毛已上顛五千言以退為先到家訪舊俱為鬼有地投閒即是仙夜雨滿樽儀狄酒春風小幅薛濤牋謝家諸婢猶前日八翼無煩更夢天感事憶昔銀燈鼓瑟琴屏開孔雀畫堂深頭顱謾有新添雪囊槖都無舊賜金好夢未成春漏盡殘星猶在曉河沉郎君自上班騅從露滿銅盤淚不禁題蘓西坡編修自撰墓誌後笑傲中吳豈問津風流自擬雪堂人白頭已了浮生事黄土真埋不死身江上鶴飛前日夢門前花散去年春漢家政爾論封禪知有遺書獻紫宸鷊籠軒然羽翼更何之毎見雲霄憶舊時鳴候露華生玉樹舞憐雪影散瑶池埀頭就食誠何報側目随人祗自悲恩重主家看養别不教鵝鴨混堦墀囊琴鍾期何在鑄黄金膠漆相投日以深妙製偶經雷氏手虛名已説蔡家琴千年流水髙山趣一旦離鸞别鶴吟塵滿敝絃雖未試不彈還自有知音京城得家書題示兒子同同蘓郎不是飲中仙只好長齋繡佛前蝶到枕邉身是夢花随春去日如年芙蓉别館還依舊鸚鵡小窓殊可憐縦得歸来城郭在銅駝露冷濕荒烟寄松江楊維禎儒司畫蛇飲酒合誰先塵土東華四十年海上豈無詩可和雲間還有事相牽牡丹開後春無力燕子歸來事可憐欲倩鐵龍吹一曲滿湖風浪又廻船夢梅花處為董師程賦江南枕上見梅花一片寒光接素霞蝶化夢魂雲縹緲香生肝肺雪槎枒乃知姑射仙人宅即是林逋處士家白玉堂深簾幙靜畫成疎影在窓紗中酒連日醉頭扶不起記曽有説酒能醫知傷肺氣終為患不典春衣亦是癡小閣留僧看鬬茗矮牀對雨教彈棋餘年有甚唐人癖稍得閒情便賦詩寄紹州知府金鑑自君領郡韶州去鴻雁天涯兩送秋盛氣不題鸚鵡賦髙懐應倚仲宣樓蹇予滯跡猶江海之子勞形欲白頭鍾乳囊封能逺寄暮年此外更何求碧筩飲次胡丞韻小刺攢攢緑滿莖看揎羅袖䕶輕盈分司御史心先醉多病相如渇又生銀浦流雲雖有態銅盤清露寂無聲當年欲博千金笑故作風荷帶雨傾花外風來香滿湖折荷舉酒笑相呼自來四眀有狂客除却髙陽非酒徒飲處有情絲不㫁折時多刺手難扶豪家玉斗雖云貴有此尊前風致無送丁道士還澧陵丁令還家骨已仙更無城郭有山川未添白髪三千丈又見銅駝五百年荒草茫茫連故國孤雲冉冉下寥天澧蘭歌送潺湲水極望涔陽思惘然題古禪上人房一染曇花百念空淨香吹遍古禪風鈎簾燕雨時時過洗鉢魚波處處通雞有佛縁曽聽法檜因寳界漸成龍三生誰識蘓居士惟是鹽官北寺鐘寄孟昉郎中孟子能文自老成早於國語亦留情省中醉墨題猶在闕下新知誰與行紈扇晚凉詩自寫翠鬟情重酒同傾接輿莫更閒歌鳳只可佯狂了此生寄周昉處士為爾停驂㡬叩門毎於清事得相論山中載酒梅花過湖上放船春水渾閒到竹齋為觧帶坐深苔徑與開樽當年醉墨留題處風雨新添屋漏痕題福源編後福縁山作魏家墳知是唐朝宰相孫石首令前官有考咸通年内碣猶存太湖𣺌𣺌連精舎喬木隂隂拱墓門千載凌烟勲業在可無遺澤及諸昆謾遊甚矣吾衰百念慵花間時一復支笻邦人幸爾不予鄙兒子樂然為我従載酒有時尋古寺看雲終日對孤峰林家湖上都能説二十餘年老醉翁月桂堂為集慶講主佛國山中古道塲月中桂子散天香一枝得共人如郗雙井能來客姓黄誰咏碧雲題樹葉自收清露染衣裳南峰不與清光礙好放餘隂及四方九日過長安鎮王山人因過王生忘坐乆堦前花有白雞冠草堂出酒生新敬雪壁題詩寄此觀肯謂陶潜逢九日却如李白醉長安老夫徧賞東籬菊搖落羣芳正耐看歸隱圖為張别駕賦難得歸来賦考槃髙情都付畫圖看可能白首更干禄縦有黄金難買閒酒舫載春擕二客巾車乗醉従雙鬟陶山地接東西眺謝傅風流或可攀可閒老人集巻三
