body:
  text: 可閒老人集别集類四元提要臣等謹案可閒老人集四巻元張昱撰昱字光弼自號一笑居士廬陵人元末左丞楊旺扎勒原作楊完者今改正鎮浙江昱參謀軍府官至左右司員外郎行樞宻院判官元末棄官不仕張士誠招禮之不屈明太祖徴之至京召見憫其老曰可閒矣厚賜遣歸更號可閒老人放浪山水年八十三乃卒明史文苑傳附見趙撝謙傳中瞿宗吉歸田詩話記其在楊旺扎勒幕中諸作又記其酒酣自誦歌風臺詩以界尺擊案淵淵作金石聲曰我死𦵏骨湖上題曰詩人張員外墓足矣其風調可以想見也其詩學出於虞集故具有典型舊稿散佚正統元年楊士竒始得殘帙於給事中夏時以授浮梁縣丞時昌刻之此本即從正統刻本傳寫者士竒原序尚載於巻端其詩才氣縱逸往往隨筆酬答或不免於頺唐然如五王行春圖歌風臺諸作皆蒼莽雄肆有沈鬱悲凉之概天寳宫詞輦下曲宫中詞諸作不獨詠古之工且足備史乘所未載顧嗣立元詩選嘗録其詩於辛集中其小傳引楊士竒序云云所見盖即此本舊板久佚流傳漸寡國朝金侃得毛晉家所藏别本改題曰廬陵集侃復為校正間附案語于下方然其本亦從此本傳録非兩書也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀可閒老人集原序廬陵張光弼先生少事虞文靖公集得詩法文靖才高識廣其詩浩博而不肆變化而不窮而一宿於正先生之詩氣宇閎壯節制老成而從容雅則稱其傳焉張潞公翥最先知之而一時學者皆傾慕之其平生之作散亡多矣予近從給事中夏時得其五七言古近體一帙以授其外孫浮梁縣丞時昌俾刻之鄒孟氏有言誦其詩讀其書不知其人可乎先生名昱仕元累陞至行樞宻院判常賛忠謨于戎幕元末政壞遂棄官不仕張士誠據有浙西禮致之不屈而與周伯温楊亷夫交游相得號一笑居士我太祖皇帝混一天下訪求前元故臣之賢者常被徵至京深見温接已而憫其老曰可閒矣厚賜遣歸遂採天語更號可閒老人徜徉浙西湖山之間詩酒自適春秋八十有三而終噫觀其詩而考其處出可以知其為人焉正統元年夏四月既望楊士竒叙可閒老人集原序
