body:
  text: 可閒老人集巻一明張昱撰古風五言飲馬長城窟行飲馬長城窟飲多泉脈枯嘶咆不肯行思若畏前途驅之尚不忍惻然駐征車朔風當面吹墮指裂肌膚豈念衣裳單顧已猶亡夫功名登天然何時執金吾隂陽無停機百年諒須臾常恐隨物化奄忽委路隅此懷當告誰䇿馬自長吁古意白露積瑤堦明月生羅幃流光劇奔電窈窕閉空閨黃金奉桑間毋乃禮義虧安得亷恥士再詠關雎詩雜詩高樓抗浮雲南盡洞庭野涼風䬃然至槁葉凄以下登臨極四顧莫我所思者憂來欲奮飛羽翼不予假昭質匪金石流年劇奔馬日暮湘水隂幽蘭謾盈把日月交互行四時亦云易去時栁未黃又見楓葉赤人生範圍内生死難固必别離將訴誰訴之又何益昨宵夢相見嬿婉如平昔覺來但虚幔衾枕有餘憶行路難鴻雁及秋來𤣥鳥先社去俱生亭毒内羽翼乃不遇翔者不知水泳者不知山世事每如此人生行路難少年行看取木槿花朝榮夕已萎芳容有凋謝膩澤何所施壽命如可長僊人今何之高堂有歌舞及此年少時古别離陽關古别離對面折楊栁旋踵委道傍焉得長在手丈夫四方志竭力車馬走慷慨平生懷不在然諾後傾貲鑄寶劍性命同所有去去勿復陳黃金印如斗古瑟錦瑟古之樂造自軒轅間朱絲五十絃柱列鵷鷺班中有洞庭水白日興波瀾人文際昌期出應清廟彈洋洋雅頌音一唱而三嘆神人旣以和鳯鳥翔其翰聖明御天下百靈咸仰攀讀離騷經三閭楚同姓怨生於所愛讒人在君側繩墨日偭背虞兹宗社隕繁辭兾收採反覆三致忠九死猶未悔靈修終不察遂投汨羅内斯文幸未喪風雅接三代豈惟南國士汲汲仰霑漑讀秦記登高望逺海中有三神山秦皇惑方士采藥駐容顔如求不死藥何必波濤間𤣥牝氣孔神日夜相循環若人善保之入聖而超凡所以廣成子度世安泥丸言志少小誦六經中歲始聞道乃知三百篇不貴辭娟好發言將自宣猶若未深造嘗恐歲年晚白露先芳艸覃恩時竄易舉筆如振槁庶或諧雅音詠歌以終老相逢行京師衆大區鞍馬俱俊游相逢念輕薄解贈雙吳鈎性命付然諾妻子托綢繆朝過狹斜道暮宿娼家樓五侯與之談七貴為之謀心膂誓百年羽翼期九州當其勢合時喝倒黃河流一朝貲用盡門户無鳴騶鄕關恥獨歸京邑難久留慨念平生懷徘徊顧河丘浮雲詎終朝失意將焉尤古詩壯哉沛中歌命世之雄者帝王有大度不在論風雅綿蕝禮樂修採詩固無暇蘇李離别辭亦自關敎化文章與政通斯豈雜王霸漢詩十九首不復辨名字蘇李及枚乘伯仲之間耳當時尚詞賦六義誰作意雖非大雅言頗有風人致篇章何在多自足傳於世所嗟黄初後作者莫與企曹公英雄姿吐詞自天成橫槊鞍馬間慷慨念平生汝潁諸文學斂袵奉明廷對酒惜時邁載歌伸鹿嗚風雲入壯懷河山助威靈至今鄴下唱猶擅文章名銅雀有遺憾哀哉短歌行鄴中盛文詞七子相掎角雖膺丞相辟未免傷流落世胄相友善宴好以酬酢出納結腹心庶僚仰殊渥願因雲雨㑹戢翼永栖托貴賤俱黃土徒存建安作魏文在世子嗣領五官將國事旣有閒經術尤所尚讌游集文學詞藻咸宗仰五星埀光彩兩曜分氣象風流積二世況復人君量快樂芙蓉池乘輦一何壯寧同汝潁士戚戚兾所望東阿帝室親復乃貴介弟降志詞翰間國事罔所兾思深而文典光彩照當世切切陳自劾捐軀以明志淫情洛神賦所願以自棄禰衡輕狡人況以才自負將赴漁陽撾侮人還自侮曹公豈容物嫁惡與黃祖值兹劻勷際焉用鸚鵡賦所以賢達士貴在識時務三謝國親臣世家金閨彦𤣥談雖時尚好爵尤所羨出各領名郡而不拘履踐能忘永嘉樂山水事游宴摛章固自美雅音從此變餘波及齊梁纎穠入哀怨嗣宗絶􅆇否善若處時晦詠懷數十篇卓爾追漢魏駕車哭而返此豈無所謂嘯登廣武臺神氣偶相㑹從來倜儻心土苴視富貴惟有步兵厨可用時一醉淵明君子儒心事甚夷曠醉來得佳眠自謂羲皇上文章固可誦節概尤所仰且無州縣拘安得言不放託志聖賢録千載成絶響高人王右丞輞川亦有樂位居尚書省志不異丘壑誰言肉食鄙而不事淡泊辭擅大雅名集多應制作唐音得所宗夫子實先覺工部行在官飢寒莫與比奔走盜賊中朝夕命如寄一飯不忘君危言以鳴世親蒙萬乘知不救妻子累文章天地間風雅可無愧賦者謾接迹此作竟誰繼襄陽孟浩然五言擅時譽迹放羇旅間氣藉江山助感懷峴山作託興洞庭賦九重獲見知一語乃上忤敝廬南山歸亦足蔽風雨篇章如可傳論何遇不遇蘇州韋刺史早事武皇帝旣蒙南宫録復膺符竹寄折節就繩墨檢身勤治理賦詩長日靜鈴閤餘香至晚逢楊開府感激道所以宜爾金玉音風雅存遺製鴛鴦篇鴛鴦水中禽居常有定偶行則共洲渚栖不異淵藪交頸情所私和鳴氣相友白頭不自嫌彩翼戢左右雄雌或失配霜霰甘獨守嗟哉羽毛類賦性乃何厚願獻金閨女繡作君子綬人或違天常翻為此禽醜幽蘭篇幽蘭不自媚叢雜生溪澗寂寞空林色過者誰復玩及時或見收不與衆芳亂夢協天使與握勤郎官盼顧兹馨香德庶以同歲晏閨思篇連日洲渚上香風吹杜若閨人念離别逺思生帷薄去年執手時記省采蘭約如何雁鴻迹遽爾成綿邈將慿夢中見反側睡難著起視東西廂衆星已寥落晨雞方再鳴曙色已東作安得攜手人歸來共春酌丹華篇修莖冒丹華碧葉相掩暎晨露發其枝舉世莫與並微風波上來綽約有餘韻相看咫尺地人逺河漢近緑房多苦心竚立秋塘暝美女篇燕趙有美女紅蓮映緑荷珮環彫夜玉團扇畫春羅流盼星光動曳裾雲氣多囘車南陌上誰不駐鳴珂松濤軒松聲學海濤洶洶不可息如驅萬山泉迸落千丈石浩然入清聽心與境為一焉知咸陽道車馬走赤日大哉利名事靜者夢不及三良詩百歲誰免死貴足留其名三良殉秦穆慷慨平生情一諾奉明主千秋共哀榮從容就長夜斯人豈偏生所以黃鳥詩至今頌遺聲班婕妤婕妤辭輦時風誼動宫闕後來紈扇詠詞氣何凄屑婦人何所恃所恃惟姿色過時而色衰枕席成棄物不見長信宫苔生玉堦側一脈泉銘為中一元禪師作天地不自私至寶發山川誰於黃金巖得此一脈泉涓涓成不息曹溪寧後先造化亦有待於師亦前縁旣供香積厨復灌富陽田譬彼釋氏法一燈遍三千泉流願無竭燈光永相傳日居而月諸於億萬斯年送薛山人歸富春舊識談天叟挑囊又賦歸性諧麋鹿友身老薜蘿衣高步雲同舉潜形鶴自飛清醪香潑甕黃絹織成機生事有繩準清言無是非勿矜絃上操若聽古人稀贈孫雷師祈雨有應天人本無二萬物備吾身一誠茍無妄呼吸皆鬼神南邦五六月熯陽如火燉法師念民食升壇肆怒嗔符召五雷伏龍起三江濵風雲隨指顧沛澤來逡巡豈惟盈溝澮更且溢河津道路接歌頌田家具倉囷茫茫大鈞内造化豈不仁安得法師輩飛行徧八垠以兹雲霓心慰彼大旱民拙逸詩守拙中乃逸用智機或生所以抱真士泯焉黜聰明賣藥不二價懸壺無姓名逍遥城市間心與造物并鶴長斷則悲鳬短續則驚萬物有常性巧偽非人情乘黃一翦拂千里無留行賢哉拙逸翁可以為世程從軍行一身旣從軍寧復顧家室日食官倉糧惟知事行役昨朝號令下負弩趨大磧驅車出城去旌麾耀白日男兒重横行萬乘假羽翼意氣從中來性命何所惜鵰鳴沙塞雨四面無馬跡不有封侯貴班超肯投筆晚春辭暄風日夜起春到亦已乆清晨捲簾坐惆悵閨中婦聞鶯暗埀淚對花嬾擡手昨宵夢夫婿白馬章臺走結成合歡帶自置妾懷袖覺來風張幔啼鳥在高栁空織錦迴文佳期竟何有採蓮詞采蓮復采蓮采花莫采葉葉上多朝露花開盛顔色同舟二姝女流盼軼明月鬬溜荷上珠將逞肌膚白岸上騎馬郎調笑五陵客豈不念所歡淇水不可越捕魚詞漁家無别業衣食惟罟網生長風波中舟楫慣來往江平風波靜天靜榔板響得魚固所欲忖心輒内怏羣生各有命吾寧受其養敢恣口實求而絶生意盎遐思放麑翁乃屬中山相贈吳琰代宣州天風吹孤蓬一去無留蹤或與迴颷遇猶希返故叢同飲南陵水況是親骨肉相見無别辭縷縷訴衷曲衷曲猶未伸征車動行塵屏營高堂上尊酒聊具陳紉蘭以為贈此志良不薄兾藏懷袖間時用慰綿邈題簡掾辨誣巻後種蘭襍荆棘棘長傷蘭根結交或匪良中道生謗言所以明喆士慎之非一門美玉累卞和明珠誣馬援終焉各有辨暫屈寧為寃自警二首愚者昧其識沈𡨕生死中一為利欲染罔測吉與凶轢轆前後聲覆轍無不同遑遑駟馬車騶從行趨風惡影不息䕃世路焉愧躬兩足與之翼去齒存其角乾坤負冥頑造化迺忖度恃此以為勇能無遭束縛衝冠與裂眦未信盡堪託毋為萬物先内省有先覺飲酒詩示壻時伯庸四首連日春風暖面容為之鮮仰看樹上花荑萼亦復然中有和鳴鳥羽翼相向肩胡能不命觴酌此花鳥前飲之豈不醉所貴乃其天頽乎麯糵間南牀得佳眠如何靖節翁乃賦止酒篇青陽時至矣萱艸滿堂階柔葉刷翠羽對之憂思裁室中無長物所蓄惟酒杯客至即與飲旣醉從先囘平生曠達懷何曾計尊罍得錢即付酒酒盡錢復來百年能幾何笑口時自開光隂劇奔電金石難與期仙人浮丘公此日竟何之看取古聖賢丘塚亦纍纍死而不朽者六經豈余欺酒中有妙趣俗士不可醫及時不作樂事過徒傷悲年華駟馬車日夜勞驅馳旣老憐餘生放情在麯糵每到花開時一飲輒累月何曾校尊罍酒量盈與竭二儀蘧蒢舍百年羇旅客劉伶乃放達注意頌酒德不見昨日花今朝謝顔色賢愚俱有歸修短隨造物卧病寄孟天暐郎中數㑹誠不辭暫離還相憶雖無膏肓慮伏枕已旬日雨雪高樓上隂沈病增劇不知湖中水晴後添幾尺日照花枝明風吹栁條碧感此春事深攜壺想無及孝感詩為吕運使題宋學士作序天地無私恩日月無私照信哉太史筆區别造化妙禎祥靡有常孝感斯乃兆金魚章服貴三事惟克肖使君實啓之後嗣有餘耀題唐李昭道畫摘𤓰圖即小李將軍思訓子中舍唐宗室丹青煥雲漢適當天后朝家國生屯難所願執藝事婉焉而上諫製為摘𤓰圖忠恪非鄙慢兾或電覽餘骨肉釋冰炭章懷恭順子盡室赴憂患囘首橫門道苦涙落餘棧路見接𤓰者恧然興永嘆悲哉黃臺辭四摘乃抱蔓神器有天命侈心暫惑亂梁公社稷臣直刦四廟算煌煌萬方業復得返貞觀上已日杭州府學敎授徐一䕫四齋訓導拉遊智果寺訪東坡題參寥泉佳遊在上已屬此清明前春景已云宴風光猶未暄往尋智果寺竟得㕘寥泉雲物豈殊昔人世自更遷邈哉長公詠風流想當年我輩復登臨花界何因縁古佛儼香閣真詮積華軒境超萬念空道勝諸妄捐緬懷此㑹難徘徊未云還申章續芳藻兾或來者傳此君軒為周昉賦種竹不在多竹多翻自俗周生達此意忩户惟數竹涼颷集雅吹炎景消煩燠精神穆如詠興寄淇園緑誰云翡翠枝不有鳳凰宿苔堦近相對色淨尊中醁雖非沈湎事庶以忘寵辱何可一日無此君美如玉棲鶴軒張天師行館在佑聖觀丁虚一提㸃方丈鶴馭從天來雪光照雲闕戛然九皋唳散落三山側乃知羽人師近作金門客玉女見投壺后羿從奔月令威古仙子竟使枉其轍不言三清事但叙千年别至今棲鶴處光怪常不滅有時玉笙歌雲氣猶下接欲賦遊仙詞作者不可得斗酒誰為呼吾將招李白陳孔碩囘泰和柬寄其丈人羅楚翁處士昔别翁未婚翁今已抱孫俊哉東牀婿玉樹照名門知我丈人行再拜情誼敦惠顧每持酒坐語移朝昏離居獲軫念殊慰羇旅魂我自京城囘安分守丘樊家事復儒業寧同東掖垣尚賴稽古力似若吾道存終焉營菟裘兩翁老青原嘯軒開軒出平湖四望惟青天嘯聲靜中起萬象俱囘旋雲霞未改色水波為之先白日每少光長風亦蕭然沈吟阮公詠興懷廣武邊寂寞千載後慷慨千載前斯人竟何人託志在空言雪巖夏雲多竒峯洞照赤日下玲瓏萬雪巖突如臨大野南風有時來素色欲飄洒體物而賦之誰為漢司馬持以遺所思丹青莫圖寫北山堂築堂太湖北堂上何所見好峰七十二終日如對面其中盡白雲且是難持贈鶴鳴露氣升魚躍波光泛唯爾禪居人天機兩相羨李息齋平章畫著色竹御屏此君有逸韻翠珮而長裾遭彼列仙人授以鴻爪書把翫猶未解倐焉淩空虚化為九鳳雛其聲襍笙竽煌煌薊丘公描寫登畫圖丹青照屏帷如對古丈夫乃知廟堂上一日不可無至今伶倫氏見之為踟蹰題天平寺楨上人房每過屢不逢出寺乃一見巖囘樹色瞑日轉霞光絢邀留復入寺禮待良繾綣欣同靜者室坐久殊未厭寂然禅榻外爐煙落經巻境靜累自遣情忘道非逺方丈如或容吾將老貧賤訪仁一初尊師願聞清淨法往謁富春僧妙論聽不厭道心中自增如此醍醐味使我嘗未曾豈無夙世因坐對古佛燈庶幾一言下彼此證三乘雪齋東坡命名少游作記萬有從妄作庸辨偽與真假山復假雪空色自相因東坡古維摩出語驚天人彈指為説法一息乃萬旬舊時言所説幾見湖水春染習或未除示此前後身題詩附齋壁庶與坡詩隣思雲軒為羅從事賦福州人四川省掾山川望三山相去幾萬里親舍白雲下懐思曷云已朝思歌陟岵暮思歌陟屺如之何勿思禄不及甘旨哀哉天壌間此思孰終始舉目皆白雲寧論此與彼但移思雲心夙夜勤治理委質旣在心忠孝同一軌題郭文醫虎圖利忘九重淵珠從龍頷得仁忘千金軀手探虎口骨獸或復其性其禍不可測馴擾亦何術貴在道與德天茁亭為栁膺賦侯門臭酒肉窮居厭藜藿賦分各有定天胡為厚薄荒園灌數畝亦足代耕穫折葵助鼎爼剪韭供春酌雖非八珍饌其味良不惡三牲安可常一瓢易為樂古之志道者糲食甘淡泊造物茁此徒於世寧妄作賢哉宋宇嘆美矣樊遲學勿嫌食肉鄙儒家貴儉約妙高院大方垕上人碧岑日在望雨雪阻登臨二客從事者杖藜長松隂縁雲及上方步履皆黃金佛香出寶閣一息􅆻初心心如白蓮花塵垢何由侵攅眉入社後此㑹還可尋廬山得逺公法侣滿東林虎溪偶然事傳笑直至今我輩仍避俗垕師誠可欽壽光宫訪道士不遇留題高阜臨大溪激流喧衆石中藏壽光宫年深翳金碧儼然天人尊羽衛何赫奕囘廊䕃古木苔蘚少行跡傳昔丹霞士於斯鍊金液丹井雖尚存鸞鶴無一隻徘徊長松下瞻望雲氣白不見種桃人惆悵還理䇿冝晚堂送江架閤還奉化隆替理之常仕進難固必在事寡尤悔於心孰欣慼從來黃甘里先廬頗完葺雖非大哉居亦異環堵室歸來宜晚歲懷抱得所適謳吟及芳辰言笑共佳夕赤城有霞氣光照五色筆門前有大路而無車馬跡幸焉返初服素願於此畢𡨕𡨕江上鷗矯首羨歸翼過清逸處士盧公墓上作處士古豪傑在衆不自異平昔鄕曲間隨時以軒輊聚書千餘巻將遺子孫計醖酒百餘石將虞賓客至甚慕魯仲連於人無所媚辟書下臺省踰垣而趨避遂隠清平山居然事高致地隣萬松嶺日夕聞鶴唳朝論美其風錫以清逸諡煌煌楊宣慰深情托姻契豈期七十年遽棄人間世遂使倜儻懷消盡虹蜺氣高墳蔓宿莽寧不為長喟子常仕今朝宗廟瑚璉器自唐譜系存簮纓舊門地賢哉郭有道毋忝蔡邕誌無憂子詩為揚州湯仲銘處士賦安分以達生所適皆天游恂恂里巷間何忮復何求簞瓢自終日冬夏惟一裘旣不願名爵寧對狐貉羞忘機鷗與親浪跡雲中儔中區本混沌愚者昧雕鎪樂哉湯處士宜爾名無憂奉聽玘法師講楞伽經留别玘公註經囘於世無所慕結壇在南塢心與道為務行苦緇素歸律嚴鬼神䕶吾從挹清芬肺腑久皈附仰聆楞伽㫖灌頂發甘露四衆瞻禮間繞牀天花雨古無雪山子我願黃金鑄兹行匪漫遊實以聞經故初地誰不明末法自迷悞不謂攴道林猶識許𤣥度忻然酬宿願言笑亦已屢出寺且復留徘徊川光暮還當理輕楫時到茅家步師旣不忘予予忘南塢路南塢釋如玘次韻附吾佛主世間赴彼羣機慕説法歴五時華嚴最先務聲聞若聾啞慈悲善調䕶脱除著敝衣令伊可親附彈斥淘汰餘一乘方顯露所以鷲峰頭四華繽紛雨頑銅及頓鐵大罏盡鎔鑄後五百世來誰復知其故居士佛㑹人聞説知幾度自吾得為友歲月幾成屢復此話無生於焉慰遲暮東林雖云逺𤣥蹤可追步鑿池種藕花共超真歸路訪巢雲子不值留題桃源不可覔結屋以巢雲只此方丈内便覺超人羣秋晚籬槿秀雨餘塘水渾安知巢雲子不是雲中君又值荷蓑出無從書綀裙聽松軒為朗上人題微風吹幽松近聽聲愈好師非寒山子安得此懷抱天機内相㑹百體同浩浩如適清涼境大地絶熱惱每從畫省歸騎馬必一造妙趣須自知難與别人道舟行即事舟行如虚空上下天光裏中宵撤前幔繁星在清泚天河橫未落北斗當面指涼風波上來吹皺青文綺蘆洲集夜禽聒聒鳴不已惡聲雖擾眠清景則可喜却思車馬塵此時動城市題隠居圖處州王啓明隠居萬山中日夕有佳色時於巖上石蒸起雲氣白桑麻鬱相望雞犬識巷陌中林芳艸地不有車馬轍為與城市逺似覺囂塵絶原田旣膏腴且是宜稼穡溪流旣清駛且是利舟楫耕漁鄙夫事富貴要不得但見桃花開不知何歲月寄謝丹青人吾將安蹇劣種德堂為岳醫士題種德不在淺種藥不在深雖有千畝地不如方寸心種之百年後所得非尺尋忠信乃佳實慈愛為繁隂如有仙人杏一核延千林以此惠後嗣安用多黃金百馬圖畫師畫馬時心與馬為一精神各自分萃此馬百匹起卧適馬性踶齧通馬力逸如龍在水馳若虎而翼遊牝得羣聚風騰各相及或滚塵沙黃或嘶艸芽碧豈無騏驎骨松下鹽車泣誰將朔漠大圖畫歸咫尺曹韓不並世按圖為爾惜木槿花誰謂木槿花朝榮夕已萎容顔逐電光老大行相隨高堂有歌舞及取少年時壽命信可長仙人竟何之浮雲一首别高士敏人生如浮雲聚散何可必倐忽萬里餘求之渺無跡有時天上見若我舊相識飄摇玉雪姿可望不可即羨此淩風翰與彼得共適田家詞為農謹天時四體務勤力日夕耘耔罷植杖聊假息兒童原上牧婦女機中織田家無别事俯仰惟衣食黽勉共百年辛苦何所惜世有五侯貴農人夢不及但願風雨好一穗千萬粒卒歲無徵科庶免憂儋石六月三日雨日車當空行雷聲從地起長風吹行雲萬籟若有喜田夫念稼穡望雲如望米甘澤始沛然三日不可止吁嗟乎蒼生何以荅天地田家田家無所具客至惟雞黍厨下作新炊門前備清醑涼風吹户牖高栁䕃塗路還家旣不逺送上采菱渡蘭雪軒幽蘭不自芳君子以貽好白雪不自潔君子用嫓操與彼蘭與雪聊付爾懷抱人生㓜而學壯則行其道青春未晼晚白日正杲杲何乃七尺軀迷邦以懷寶時哉不可失功名貴及早古風七言河漢篇河漢亘天幾萬里鶉火西行入箕尾金氣浮空漾白波任是雄風吹不起一河之水皆空青往還惟此烏鵲翎太史不識漢使者却奏張騫為客星載囘織女支機石牽牛隔河來不及二十八宿有常經七夕胡能㑹靈匹西牛東女長相望女則織紝牛服箱人間兒女謾愁思河影不滅秋夜長唐太宗駿馬圖昭陵石刻今無有絹素乃能存不朽當時竒骨濟時艱駕馭盡入天人手隋家再世俱凡庸不知肘腋生英雄晉陽奮起六駿馬蹴踏人海波濤紅帝王一出萬邦定干戈四指羣小空淩煙勲臣盡圖畫一旦肯遺汗血功嗚呼何從得此様規模却與石刻同乃知帝王所駿乃龍種豈可求之凡馬中唐家開基三百載展巻尚覺來英風張建封擊毬圖唐家風流尚毬馬中外靡然為之化徐州節度張建封坐領東藩示閒暇長簫短吹行相隨以此慢遊為日夜玉山滿馬扶醉歸正及樓頭望春罷孔雀屏圍次第開黃金買得春無價不敎白日向西馳只許黃河向東瀉使君死後誰登臨燕子不來風雨深緑珠甘守珊瑚樹文君獨宿鴛鴦衾當其意氣傾朝野肯信人無百年者萬言猶在從事書一幅空遺後人畫五王行春圖開元天子達四聰羽旄管籥行相從當時從駕驪山者宰相猶是璟與崇華萼樓中雲氣裏兄弟同眠復同起玉環一旦入深宫大枕長衾冷如水興慶池頭花樹邊梨園小部俱嬋娟楊家姊妹夜遊處銀燭萬條生紫煙寧知樂極哀方始羯鼔未終鼙鼔起褒斜西幸雨淋鈴囘首長安幾千里贈河南衛畢將軍歌壯哉將軍八尺軀陣前奪騎生馬駒有力每輕弓兩石據鞍手橫丈二殳小敵如怯大敵勇生平氣與忠義俱逢時受命從大將勢合風雲興海隅奉辭東下尉陀國囘兵北擊無單于望風襁負至者衆將軍為駐南征車歸來九重賜顔色蹈舞恩光生步趨團花戰袍出内府大官羊膳來公厨洛陽關東古重鎮授以斧鉞專城居緑槐高暎使者節黃金新鑄兵家符握刀負盾走壯士擁蓋吹笳喧道塗盡知勲名在忠義千騎萬騎先傳呼祈連亦有霍去病細栁豈無周亞夫只今將軍與之並人馬相輝古即無君恩廣大法天地將軍報答將何如丹青或接萬億載忠義莫虞無畫圖送程希道囘河南銀鞍白馬郎自是平臺客海水桑田不自知朅來二紀異南北他鄕忽然顧我笑有如清風灑蘭雪開心寫意慰離居别時童孺今有鬚知從馬援在軍旅不謂陳琳工檄書我於程家最知舊大宅修椽曾置酒玉瓚紫笙吹鳳凰羅袖春衫舞楊栁因之感念二紀前躍馬射麛江水邊煌煌賔從散秋葉叠叠樓臺成野煙程生程生旣㑹面疏麻瑶華莫持贈但存此日㑹面情地北天南有相見丈夫有志豈陸沈使者不憚巖穴深他時或有公車召嗣我雲間金玉音贈製筆生許文珤許生精藝誰可及材用剛柔以製筆水盆洗出紫兔毫便覺文章生羽翼蒙恬將軍為動色為是秦皇舊時物丞相斯曾從駕行載此篆書封禪碣從秦至今幾千載兔尚存皮竹可采利濟天下功不有入手千人萬人愛我昔為郎居粉署用筆惟於許生取輕衫日對紫薇花寫遍江淹夢中句夢雲樓為佑聖道士王景丹賦阿母妊娠曾夢雲道人見雲如母存高天悠悠不可聞虎豹守關深九門丹青樓館雲中起翠幙銀屏按雲氣縹緲時聞子晉笙蹉跎日集王喬履蟠桃千年花又開雲中不見阿母迴丁令白鶴有再至漢宫青鳥無復來但願無風亦無雨桃花開遍夢雲處花氣騰空結紫雲拔宅乘雲上昇去玉局生引龍翔住持毛起宗參隨鶴駕謁九重沖虚敎主許器之名以玉局高其風贈言五十有六字盡説大羅天上事老君出現成都時地神湧局亦如此空歌黎羅還上清再三祝付玉局生吾徒被服老君敎毋忝玉局之所名名非可名局非局心田種熟藍田玉入水不濡火不焚一氣孔神無斷續況聞古有毛仙翁是身雖異性則同華表白鶴猶未歸函關青牛今則逢道家宫闕連雲起日食仙曹千萬指誰其主者玉局生宴坐無為觀太始白翎雀歌烏桓城下白翎雀雄鳴䳄隨求飲啄有時決起天上飛告訴生來羽毛弱西河伶人火倪赤能以絲聲代禽臆象牙指撥十三弦宛轉繁音哀且急女真處子舞進觴團衫鞶帶分兩傍玉纎羅袖柘枝體要與雀聲相頡頏朝彈暮彈白翎雀貴人聽之以為樂變化春光指顧間萬蕋千花動絃索只今蕭條河水邊宫庭毁盡沙依然傷哉不聞白翎雀但見落日生寒烟捕虎行碧油幢下曹司兵見義有勇身為輕平生每得貴人喜有似花卿知姓名一朝共聽將軍令鎮市臨平虎尤甚汝司其兵往捕之食肉寢皮須要盡司兵受令即出城怒氣填膺風火生揚言大明聖人旣御世爾虎何物猶縱橫大刀長㦸屯村堡前期釘牌後斷道村堡喜得司兵來萬夫鼔勇千夫譟半月捕獲十三枚大檻小車推載囘自言此乃將軍令豈是小人之力哉將軍索酒指其虎此虎不死司兵死在官食禄忘其軀亦是人間好男子資壽堂為之醫藥以資壽古人存心子能有治生若然天必與衣禄何憂不豐厚潘彛世籍富豪家金珠斗量錢載車百年風雨換門户甘守儉薄為生涯法依本艸為炮制修合肯教違矩矱日月囘旋碾上輪虎龍交媾爐中藥服之一劑神氣全百齡壽等金石堅洪範五福壽居首有金無壽真徒然彛也性秉芝蘭秀湖海香名喧衆口修文坊南當大街如斗之字出高牌貴人長者共祗重每日門前車馬來望雲詩為翼城常盤賦風吹白雲天上來游子望雲心眼開小時見雲在親側安得親同雲往囘世家翼城桐葉里雲自往囘親在彼昔年捧檄為榮親得官拜親雲亦喜所憐得祿逺莫分委質為臣命在君青袍駿奔各有事斑衣兒啼更勿云我知爾家廣田宅小弟朝朝縱圍獵暮歸雉兔滿馬鞍不使高堂甘㫖缺望中有使頻寄書夫人堂上哭羅襦願爾長辭楊震金願爾長懸羊續魚親之念子無不至子思其親雲即是紅顔蚤受縣君封莫計同餐太倉米桐葉之里非一家如爾兄弟誰不誇牆頭風吹紫荆樹堂前露浥萱艸花莫言親逺翼城縣萬里關河如對面一官九考今八年指日雲中又相見雲林歌李侯雲林心所仰旣見雲林副心賞欣然為我出圖畫索我題詩畫圖上我自别侯二紀餘不得半紙廬江書乃知已膺廟堂聘梁棟之材寧不如雲林乃是君所植雨露蟠根同鐵石直榦慿淩御史霜青雲照耀郎官筆即今英發當盛年上林玉樹幕府蓮東閣梅花時自詠南郡官曹誰更賢從知侯家積隂德鳳雛七枚毛五色覽輝已出丹穴中來儀定集虞廷側安棲不用求梧桐雲林氣接扶桑紅結巢日邊長羽翼好音惠我雙飛鴻玉簫引為沈仲德賦洞簫宫前有狂客雙眼直嫌天地窄甕中釀熟葡萄漿養得身輕好顔色興來為我吹玉簫縹緲一聲生泬寥驚鸞跱鵠不自定游絲落絮隨風飄高情逺思遊碧海此豈肯受黃門招笑言學簫二十載家業凋零心不悔要須吹上鳳凰臺白日羽儀生五彩王無偽仙翁見訪為賦此詩神仙之術本無作當面無縁尋不著但能寡欲自長年愚者昧之求海嶽此術不許凡俗知道成由來非大藥仙翁高風何所喻天垣月暎王喬鶴等閒瓦礫變黃金候爾相從步寥廓寄河南衛鎮撫趙克家叙舊程生河南來始得河南信雨散雲飛二十年萍蹤梗跡今纔定却思小孤洲渚邊大江大浪拍戰船將軍鬚髯勁如㦸白石酣歌便醉眠我從别來贊畫省芙蓉幕與風塵逺洪武初年自日邊詔許還家老貧賤池館盡付當時人惟存筆硯伴閒身劉伶斗内葡萄酒西子湖頭楊栁春見人斵輪只袖手聽人談天只箝口年過七十髮未斑路塗不辭牛馬走知爾出鎮在洛陽宫袍健馬日煌煌前騎大旗畫羆虎後騎長㦸横雪霜我於此事别已久富貴浮雲更何有鴻雁得便時附書但問老人平安否題醉墨堂為桐江俞子中賦世稱艸聖惟張旭氣在神先從所欲醉來捉筆走風雷電掣長雲夜相逐健於大野戰蛟龍媚似輕波浴鴻鵠由唐至今幾百年筆法竟爾失其傳芝翁乃若神所授亦以醉墨題堂前晴絲􅇢空王逸少生蛇絆樹黃庭堅筆法不必問高閑筆勢不必詢懷素縱橫遲疾心自知曾見公孫大娘舞雲門山房為青州曹伯起賦雲門山房何所指知爾不忘桑梓意山在城南百里間沃衍膏腴宜樹藝中有一村俱姓曹列㦸高門是鄉里青州舊入齊封疆相國猶傳漢家世曹彬為宋下江南史冊能書其門第四世之祖在元初遭際風雲致爵位亦參丞相下豫章腰插金符位元帥但知報國守忠貞不肯隨人事軒輊用也綽有乃祖風一簣不止山可崇碧梧枝老自棲鳳緑竹根深須化龍昔時未到山房裏每望雲門候佳氣却縁亦是豫章人客舍并州如有喜雲門之山青接天鴻濛旣判知何年山房去天不咫尺名與雲門當共傳贈狄鳴善捧檄迎母往金蘭州就養人子能不念其母烏鳥啞啞猶返哺十月懷娠乳抱勞亦期仰事慰遲暮那知中道母子分南望親舍唯白雲伯也執殳在軍旅堂上消息空傳聞將軍命許迎就養拜捧檄文喜無量杭州萬里到蘭州母見子如墮天上膝間乍見歡復悲天河水流有合時宜男艸是别時艸老萊衣是别時衣只今四海車書一人間萬事真難必十年戎馬行陳間子母團圞有今日題湖州何生售書養母詩巻衙散到家無與適領客壺觴以終日何生忽從湖州來當筵不語惟長揖古貌存心行孝道袖出舊書三兩帙進言售此偹甘旨有母行年將八十吾聞此語為太息傷哉貧乎乏朝夕龍蛇蟄藏天地閉宜爾之賢身不立莫説家無田可耕縱有田耕那得食不如歸棹湖州船有魚可釣鳬可弋君不見賣刀與賣㦸朝持出門暮得直文章本是太平具以此干人復何益軍人或有錫類人傾産酬書吾可必東圃詩為道士王景丹賦東圃軒在𤣥武宫海日欲上煙霏紅若人餐之百體充養得面貌如嬰童上清有法授有宗靈章祕咒存心胸一氣孔神天與通右衛白虎左青龍擲火萬里行老翁欲雨即雨風即風燮理造化代天工事親則孝君則忠神人執鞭須相從題王朋梅界畫大都池館圖様元朝人國初以來好時節冶緑妖紅蓋阡陌樂遊盡是勲貴家人閙馬嘶聽不得細漆闌干輦子車同載女子如蕣花車中馬上目相許蝴蝶夢滿東西家牡丹臺畔夜如晝花炤銀燈大於斗正月飲到三月中樂地歡天古無有一朝花謝春復歸門鎖池園空緑苔簾前塵覆珊瑚樹案上蝶棲鸚鵡杯豪華盡逐東流往百年丹青化草莽當時命酒徵歌人此日題詩畫圖上題畨使進呈三馬殿中得名畫畨馬筆力不在陳閎下方其畨使引進時詔許當軒對描寫近前一匹白鼻騧咫尺天威生懼怕第二匹馬青連錢矯首嘶鳴意閒暇向後赭白馬最雄霧鬛風鬃勞握把三馬旣出澣海空天廏真龍此其亞畫師貌此良苦心慘淡精神入夷夏冥冥雷雨晦大河漠漠風沙連巨野諸畨服飾本華靡不獨丹青侈圖畫百年絹素霜雪新拂拭徒為發悲咤莫言世有真乘黃只此按圖誰識者天馬歌天厯間貢天馬來自茀郎國足下風雲生倐忽司天上奏失房星海邊産得蛟龍骨軒然卓立八尺高衆馬俛首羞徒勞色應北方鍾水德滿身日彩烏翎黒縱行不受羲和轡肯使王良馭輗軏黃絲絡頭兩馬牽金􅌱雙埀玉作鞭寵榮日賜三品禄不比衛鶴空乘軒大國懷柔小國貢君王一顧輕為重學士前陳天馬歌詞人逺獻河清頌鸞旂屬車相後先受之却之俱可傳普天率土盡臣妾聖主同符千萬年贈楊彦臣使還宋楊通寅祭酒十四世孫元武岡總管外孫使節何煌煌騎從造我門自陳世有通家舊武岡太守之外孫俊哉舒侯賢宅相執禮愈恭辭愈降老夫已是閉關人甚厭傳呼到閭巷須臾驚定還復悲挽生近牀為抱持爾外大父强健否此來殊慰我所思黔陽到浙七千里相問相看疑夢寐祥符年貶祭酒公安江之陽無乃是自從隔却蒼梧雲隻字片言無得聞車書旣同四海一逢人每問舊參軍立談知生具才美金鐘大鏞莫與比池上曾聞咏鳳毛詩中又見歌麟趾當今聖德及海隅龍馬出圖龜負書直言治安容賈誼喻蜀父老煩相如心存忠孝在年少縣官勸駕能應詔得時舉步即青雲瑚璉從來在宗廟織錦詞行家織錦成染别牡丹花紅杏花白作雙紫燕對銜春一疋錦成過半月持來畫堂捲復開佳人細意為剪裁銀燈連夜照針黹平明設宴章華臺為君著衣舞埀手看得風光滿楊栁蝶使蜂媒無定栖萬蕊千花動衣袖囘囘舞罷換新衣新衣未縫錦下機憐新棄舊人所悲百年歡樂唯片時贈趙希哲還河南仍寄其父太醫趙生幼小辭鄉里長成却自河南至風流藉甚芝蘭室文采粲然瑚璉器懋遷不憚萬里遙魚鹽歲逐商人利杭州舊是繁華地輕薄相逢增意氣愛生不登酒家樓重生不遊花栁市秋風八月栁條黃束裝别我還洛陽樓船大帆高十丈順風一日到高堂高堂雙親應自喜寶貨旣豐兒亦至定呼斗酒出屏帷膝下相歡復相慰自來隂隲富人家廬山董奉非徒誇拜罷而翁煩問訊好種門前仙杏花蓮塘曲青蘋風起栁塘水波聲夜聒鴛鴦睡一㸃芳心不自持露荷又作􅛔珠碎藕絲織錦香滿機裁成衣裳將遺誰只愁賤妾夢魂短不恨蕩子歸來遲花間鶗鴂依芳艸等閒緑遍邯鄲道還應憶念蕩舟人滿架芙蓉鏡中老過歌風臺世間快意寧有此亭長還鄉作天子沛宫不樂復何為諸母父兄知舊事酒酣起舞和兒歌眼中盡是漢山河韓彭受誅黥布戮且喜壯士今無多縱酒極歡留十日感慨傷懷涕沾臆萬乘旌旗不自尊魂魄猶為故鄕惜從來樂極自生哀泗水東流不再囘萬歲千秋誰不念古之帝王安在哉莓苔石刻今如許幾度秋風灞陵雨漢家社稷四百年荒臺猶是開基處讀易處為俞文輔賦易經四聖人之事潔靜精微惟此書夫子五十以學易爾今讀易年何如易之為書廣大而悉備不以一言一事拘君子觀象玩辭處近取諸身而論諸按文責義而有得斯乃萬方之一隅履德之基謙德之柄復德之本恒德之固損德之修益德之裕困德之辨井德之地巽德之制於此九卦能體騐可無大過為德符讀易於斯而自勉仰觀俯察非吾徒羲文周孔雖旣没天人其不在兹乎風木歌為褚本中賦并寄徐一䕫記褚孝子感風木樹猶如此親安在歲月去人何迅速陟岵陟屺望不及入室升堂成宿昔劬勞未報棄諸孤號泣旻天涕沾臆走獸聞之失其羣飛鳥聞之墮其翼物之感也有如此宜爾諸孤哀罔極始豐先生辭餘力文章今擅歐蘇筆記成不忍再三讀未及終篇語嗚咽乃知人皆有父母天性油然非染習孝思不匱永錫類草偃風移而俗易三復始豐記擊節為太息往求二木之所在果然拔地俱千尺孝子之父見手植造物於斯有隂隲君不見東坡所記三槐堂魏公德符在他日送馮以清知事赴成都右衛幕府李白苦歌行路難以喻世途之難有如是莫言難於上青天時至青天是平地五等之爵國所司萬鍾之禄人所兾為臣忠實而不欺畫像式接咸可至石樓先生舊簪纓出宰三綬郎官貴即今任政成都幕萬事只應咨伯起葵藿常存向日心鵾鵬㑹展埀雲翅玉陛承恩咫尺天官船給驛八千里三峽盤渦轉殷雷萬壑啼猿響空翠相如擁傳喻蜀時縣官負弩爭趨避況爾旌旗出入間丈夫足展平生志讀杜拾遺百憂集行有感余生行年將八十不知何者為憂戚富貴不驕貧賤安以此存心度朝夕往來承乏佐中書大官羊膳供堂食只今賜老作編氓衣食信天無固必陋巷簞瓢如素居不管茅茨春雨濕門前載酒求賦詩錦軸牙籖日堆積在官不置負郭田旣老翻得稽古力毁譽都忘月旦評姓名不上春秋筆朝米不煩隣僧送暮米不煩太倉糴我亦一飯不忘君文人相輕所不及傷哉白首杜拾遺入蜀還秦勞轍迹文章蓋世亦何為妻子相看百憂集西溪栁送人赴京西溪栁自是風流樹受用春風好眉憮長條折盡還復生如何免得人來去千樹萬樹接郵亭到官五見楊栁青百年行路有離别三月飛花惟送迎知君母留彭澤縣門前五栁都哉遍宻葉能藏反哺烏柔條不礙雙飛燕膝下長懷萬里心風光滿眼瞻上林請羮遺母應有賜咫尺龍墀恩露深題華光梅墨梅之作盛衡湘始作俑者惟華光此僧平生十萬紙筆力所到花為香是誰好事憐清苦三二百年存絹素和靖多情縱有詩廣平得意還能賦東坡先生昔倅杭萬松嶺見一枝長我今見畫如昨夢都在君家白玉堂題劉松年畫張志和辭聘圖長安城中晨鼓響馬後紅塵高十丈吳儂為爾去烟波卧聽樵青閒蕩槳醉來即唱滄浪歌平生志願今無多鷦鷯不巢上林樹鸒斯不啄玉山禾是身渺焉寓天地何殊太倉之稊米野人本乏濟時䇿孰謂要君徵不起所以漢光武不强嚴子陵放歸江湖從所志千年萬年呼客星聖人在位麟鳳在野洛旣出圖河復出馬普天率土遂其生四靈咸集依至化唐堯埀拱而在上禹稷憂勤而在下當時天下所不臣亦有臨流棄瓢者題三友圖劉文學如冠玉平生所性在擇友友此梅花與松竹後凋莫問歲寒心眼中且得無塵俗顧兹鬱鬱在徂徠瞻彼猗猗在淇澳更有江南萬玉妃暗香吹遍湖山曲三友地逺莫致之收拾畫圖歸一幅竹為君子松大夫梅則佳人在空谷從他坐客寒無氊只此可以伴幽獨君不見𤣥都觀裏千樹桃盡是人間閒草木貞婦詩諸曁縣有吳氏女十五嫁作蔡家婦十六生兒夫即亡日抱呱呱為乳哺情知身是未亡人善事尊嫜猶父母盡抛妝具洗鉛華盡棄羅襦服荆布蓬首􅄔居八十年孤子有孫孫作父采蘋采藻供祭祀嗃嗃家人無閒語婦人言行止閨門懿德何由出庭户憐我弱孫蔡光祖再拜請求鄕曲譽魯恭治縣車馴雉劉昆作郡河渡虎承流宣化物為感況乃觀風行繡斧母今行年九十六人壽百年餘幾許門前滄海變成田屋後白楊堪作柱寒鴉猶帶朝陽日銅人亦沾未央露古傳生女作門楣貞節之褒誰不慕聖恩浩浩如江河母息厭厭迫朝暮蚤將封事謁天閽為母一擊登聞鼓送蔡孝亷囘侍母暨陽有蔡宗盟甫能以力耕侍其母懷橘之名早已傳分椹之心壯如故我嘗使驛至其家有花有栁當門户雖非郭泰可榆栁且有茅容具雞黍暨陽之邑臨上虞大舜遺風尚千古蔡乎蔡乎清川旣東不再西白日過時不再午揚雄愛日著新訓甘旨温凊不厭斁人皆有母我獨無西望同安心更苦汝歸何以獻高堂遺汝瑶華慰遲暮軍中樂送征南掾史張毅赴京我嘗軍中行從知軍中樂高牙大纛啓征途風雲隨䕶中軍幕千乘萬騎指顧間環而居之迺城郭五更觱篥吹一聲旄頭驚向天邊落捷書日夜報天子親筆勅書加寵渥刲羊宰牛餉壯士萬歲歡呼震山嶽大斾悠揚錦萬里從伶窈窕花千萼男兒墮地志四方蓬矢桑弧為有托遭逢主聖得臣賢風順鴻毛易寥廓只今詔檄登大府鷙鳥之中瞻一鶚渭城且莫唱陽關舉杯為賦軍中樂李龍眠畫飲中八仙歌龍眠白描誰不賞胸次含空生萬象筆下猶存小篆文落紙烏絲幾千丈小時讀歌心愈竒此日按圖神始壯浣花草堂老拾遺詠彼八仙將自放天寶年來萬事非得醉如逃三面網鳳鳥鳴歧縱德輝麒麟見魯辭羈鞅丈夫骯髒迹每同孰謂龍眠成技痒眼中未見獨醒人未免開函為撫掌義株行廬陵江西古名郡四忠一節之故鄕豈惟英賢間世鍾造化亦有義株連理呈禎祥豐塘三山兩株樹托生離立不數武高莖擎天一蓋張深根走地羣蛟怒曾氏世居株樹邊詩禮傳家三百年尚書旣為連理詠丞相復入郡志編二公真蹟今猶在文光照耀無年載李囦諸孫尚有傳桑田誰謂成滄海五世孫亦一老翁欲以此事徵盲聾豐塘之株無乃豐城劍變化偃蹇雙蛟龍不然安得保風雨專與三山為始終懷逺亭詩為東甌鎮撫譚濟翁作譚世績之後宋史有傳譚將軍勇而禮宋之端明學士七世孫蚤年身逐兵塵起鼻尖出火耳生風馬上飛塵虎添翅出門志願定逺侯果然持節鎮東甌上宣德意化海俗鯨鯢滅跡波為收古來鎮將還如此緩帶輕裘接賢士襄陽沈却峴山碑水底魚龍猶識字國家承平千萬年軍中之樂何可言太牢五鼎飡壯士從伶百戲陳廣筵山川不隨人事改端明丘壠今猶在亭名懷逺乃在兹地下幽魂有光采普天之下皆皇家故鄕何必懷長沙人臣受命無逺近河源曾泛張騫槎食君之禄治軍旅咫尺轅門誰敢去私情丘壠豈不懷日夜沅湘水東注學仙曲二八女人貌嬋娟杏花隂裏競鞦韆同心錦帶刺石蓮逢人學縳剪刀錢却妬鴛鴦沙上眠五言絶句古辭歡樂自歡樂苦辛長苦辛城中十萬户誰是種田人風雨牧牛圖牧牛值風雨牧具幾脱手不自風雨前不自風雨後石友蒼然柱石姿風雨莓苔久幸同貞固心相看即吾友竹居百年駒過隙萬事成鞅掌自顧非此君誰與共清賞花徑繁花作高樹狹徑不數曲醉來扶杖行幽興亦自足蕉林愁懷常把酒愛此滿林玉風迴舞袖翻欲近紗忩緑芳屏衆芳結為屏左右暎紅藥問訊園中人何如金孔雀蔬畦學圃纔兩畦佳蔬欲幾品露葵不厭烹及我春酒醒梨花折枝已過清明節猶依玉鏡臺一枝如折得幾誤蝶飛來水殿納涼圖别殿紅綃女無風亦自涼闌邊是湖水夜夜宿鴛鴦七夕乞與人間巧全慿此夜秋如何鍼線月容易下西樓别劉博士秖為情如雨從敎醉似泥免看楊栁色相送出城西王昭君二首漢地非無雪邊城不見花琵琶一萬里馬上盡風沙巾幗猶知辱裙釵可即戎單于如有問敎妾若為容銅雀臺自古誰無死英雄豈不知望陵歌舞歇還有夢來時邊思萬里盡風沙征人念歲華角聲悲自語誰見落梅花赤壁赤壁不改色漢江依舊流二龍爭戰後風月屬扁舟峽川石與青天近浮雲向客低自然堪下淚不是有猿啼題揚州史左丞畫扇后土祠前路金鞍憶舊游春風雙燕子渾似在揚州塞上朔風西北來驚沙對面起人馬暗相失咫尺已千里題商山觀奕圖縱橫十九路一著一囘新如此深山許旁觀亦有人題村廟禍福慿誰降雞豚合有災年年當社日簫鼓賽神來飛來峰峯在西天竺青蓮千葉開佛應無妄説或恐是飛來呼猿洞洞閟煙霞古巖迴藤蔓叢誰能將劍術往問白猿公題名石東坡龍井囘題名塔磚上豈期後百年過者為瞻仰合澗橋兩澗何年合一橋終日閒桃花逐流水未覺是人間龍公洞龍或藏其用跡與蛇何異慚愧耕稼人猶來候雲氣飯猿臺僧旣非昔年猿亦異往日唯有飯猿臺猶是當時石連巖棧連巖有棧道重叠架古木勿輕縱步險平地折車軸客兒亭客兒謝家子明師夢相待斯人骨亦朽斯亭尚千載坐禪石法師禅定時萬象付𡨕漠至今巖前石每每天花落鄰牆梅花臘後春纔到寒香襲素袍梅花如有意不在粉牆高聞鐘朝撞亦悤悤暮撞亦悤悤銷磨浮世事都在數聲中墨萱草種得宜男艸忘憂度歲華墨池憐照影朶朶鳳頭花葛仙溪葛仙浴丹溪飲溪骨自蛻試問歸來鶴何人壽千歲濟川圖平地有摧輈慎者或不免奈何千金軀涉此風濤險菊花萬夫起銅盤拔地一千丈寧知白露華暗滿菊花上臧祥卿畫竹枝白頭禽扇面片月出幽林閒情欲不禁天寒憐翠袖為賦白頭吟西施洞館娃宫前洞西施舊來往自載扁舟後歲歲春蘿長履跡西施往行處好事作履跡幾寸莓苔深見者為憐惜問梅一種隴頭樹東風都合吹未應造物者偏在向南枝喜新晴五色雲間鵲今朝忽放聲繞簷飛不去亦是喜新晴泉月軒為開元宫張道士賦為貪真境好每到即忘歸叩齒潄明月清光生羽衣題餐霞洞愚者昧其覺貪生還一夢不見餐霞人唯見古時洞李息齋平章畫生色竹一代風流盡丹青付此君忍將湘浦淚更灑九疑雲題牧溪畫飛鳴二雁秋風幾萬里一色是青雲誰信天山路無書可寄君倦飛憐羽翼引領一長鳴紫塞秋何似今宵月正明新宫訪袁真人知已羽化留題仙客己塵土桃花依舊春後來看花者不是種桃人惜花昨夜一花開今朝一花落春事能幾何奈此風雨惡僧華光畫梅誰與一毫端示此無垢相迦葉不可招始悟色空妄栁莊種栁連莊屋春來色更嬌不同殘臘見封雪落長條桂林不用歌叢桂誰能更出山若無妄世事來共此中閒蘭渚幽蘭滿洲渚紉之可為佩欲遺心所親涔陽何處在竹坡城中寸金地種竹不可多風前值杖看奈此緑隂何𤓰田仲夏生意繁延蔓若野葛結實田畝中庶慰行者渴荷港門前東西道下是荷花港越女不避人唱歌來蕩槳鶴亭有時命童子亭前按舞鶴雖無賓客歡對此亦云樂魚池放魚池中央池水深尺許勿謂江河逺時來足風雨題市學堂喧聒從終日跳梁欲上街要令心目靜除是掩空齋贈歐陽尚禮還播州人生豈無别咫尺異言笑況復萬里遙風煙接蠻徼觀拆白塔有賦白塔誰所營又復為平地猶有百年人閒來説興廢題章叔厚所畫投竿圖大魚不可得小魚釣何益不如投竿坐臨流以終日上清方方壺作墨畫贈毛起宗提㸃風火鍊仙骨雲雷鑄鼎文壺公探造化圖寄大毛君趙清獻小像當時仰望公畫筆開生面之官惟琴鶴千載趙清獻别故人未别欲千言臨别無一語惟此舊時心隨君渡江去别鄕友共是他鄉客從遊又隔年老人偏惜别把臂一茫然贈縣令任滿一勺清泉水三年共此心不堪彈别鵠惟是邑中琴磐石吹簫圖宰相五更朝金鞍拂栁條何如磐石上散髪坐吹簫白頭翁疎蔓短於蓬卑栖怯晚風祇縁頭白早無處入芳叢落梅花含章人正卧幾片下空牆春雪調鉛粉相和一處香題宋子障太守畫老樹含青雨平林澹白煙隔溪茅屋在好泊米家船題趙子昻畫梨花畫眉圖鳴春如有意誰與畫眉長若訴梨園事開元夢一塲惱啼鴉朝啼人盡睡暮啼人厭聞非關毛羽惡不入鳳凰羣代毛延壽豈謂黃金少除襃君未知古來因好色滅國是龍漦高房山畫扇結屋清溪上仙凡此路分終朝看不厭惟是滿山雲捕魚圖畫出溪邊景渾家在捕魚筆頭餘興在幾㸃暮鴉疎晚望東村開門見東村晨光尚蒙昧白雲何處來適與予心㑹題王大年畫舟楫為生計沙鷗識此情百年浮世事九鼎一絲輕林子山畫為鄭宗表題尊前可忘世綸竿聊伴身樂然溪水上魚鳥與相親雙蝶相逐雙飛蝶風前不自持有生皆有感微物豈無知白練帶禽一雙白練帶繞樹效于飛宜爾閨房喜圖形上繡衣秋棠晚思圖兩雀晚相依棠梨葉漸稀連枝有深思未可便辭飛可閒老人集巻一
